            <div style={{flex:1}}><div style={{fontSize:11,color:'#7a5545',marginBottom:3}}>{t.saidas}</div><div style={{fontSize:17,fontWeight:700,color:'#d44747'}}>{fmtS(gas)}</div></div>
            {divMes>0&&(<><div style={{width:1,background:'rgba(212,168,71,0.12)',margin:'0 12px'}}/><div style={{flex:1}}><div style={{fontSize:11,color:'#d44747',marginBottom:3}}>Dívidas</div><div style={{fontSize:17,fontWeight:700,color:'#d44747'}}>{fmtS(divMes)}</div></div></>)}

        {/* Desafio 52 Semanas card */}
        {onDesafio&&<div onClick={onDesafio} style={{background:'linear-gradient(135deg,rgba(200,120,74,0.15),rgba(212,168,71,0.08))',borderRadius:16,border:'1px solid rgba(212,168,71,0.25)',padding:'14px 16px',marginBottom:14,cursor:'pointer',display:'flex',alignItems:'center',gap:14,active:{opacity:0.85}}}>

          <div style={{flex:1}}>
            <div style={{fontSize:13,fontWeight:700,color:'#d4a847',marginBottom:3}}>Desafio das 52 Semanas</div>
            <div style={{fontSize:11,color:'#7a5545',lineHeight:1.4}}>Guarde R$1 por semana e acumule R$1.378 em 1 ano</div>

        </div>}

        {/* Top categorias */}
        {topCats.length>0&&(<div style={{background:'#1a1008',borderRadius:16,border:'1px solid rgba(212,168,71,0.12)',padding:'14px 16px',marginBottom:14}}><div style={{fontSize:12,fontWeight:700,color:'#d4a847',marginBottom:12,textTransform:'uppercase',letterSpacing:'0.06em'}}>{t.ondeGastouMais}</div>{topCats.map(([cat,val])=>(<div key={cat} style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:8}}><div style={{fontSize:13,color:'#c8a090'}}>{cat}</div><div style={{display:'flex',alignItems:'center',gap:10}}><div style={{width:60,height:5,background:'rgba(212,168,71,0.1)',borderRadius:5,overflow:'hidden'}}><div style={{height:'100%',background:'#d4a847',borderRadius:5,width:`${Math.min(100,(val/gas)*100)}%`}}/></div><div style={{fontSize:13,fontWeight:600,color:'#d44747',minWidth:70,textAlign:'right'}}>{fmt(val)}</div></div></div>))}</div>)}

        {/* Últimos */}

          <div style={{fontSize:12,fontWeight:700,color:'#d4a847',marginBottom:12,textTransform:'uppercase',letterSpacing:'0.06em'}}>{t.ultimosLanc}</div>
          {transacoes.length===0?(<div style={{textAlign:'center',padding:'30px 20px',color:'#5a3525',fontSize:13,background:'#1a1008',borderRadius:16,border:'1px solid rgba(212,168,71,0.1)'}}><div style={{fontSize:28,marginBottom:10}}>💰</div>{t.nenhumLanc}<br/><span style={{color:'#d4a847',cursor:'pointer'}} onClick={onAdd}>{t.toqueComec}</span></div>):(transacoes.slice(0,5).map(tx=>(<div key={tx.id} style={{display:'flex',justifyContent:'space-between',alignItems:'center',padding:'10px 0',borderBottom:'1px solid rgba(212,168,71,0.07)'}}><div><div style={{fontSize:14,color:'#c8a090',fontWeight:500}}>{tx.descricao||tx.categoria}</div><div style={{fontSize:11,color:'#5a3525',marginTop:2}}>{tx.categoria} · {fmtDate(tx.data,LANGS[lang].locale)}</div></div><div style={{fontSize:15,fontWeight:700,color:tx.tipo==='receita'?'#5cba7d':tx.tipo==='divida'?'#d44747':'#d44747'}}>{tx.tipo==='receita'?'+':'-'}{fmt(tx.valor)}</div></div>)))}
        </div>

        <button onClick={onAdd} style={{width:'100%',background:'linear-gradient(135deg,#d4a847,#c49030)',color:'#0f0a08',border:'none',borderRadius:14,padding:'14px',fontSize:15,fontWeight:700,cursor:'pointer',display:'flex',alignItems:'center',justifyContent:'center',gap:8}}><Icon n="plus" s={18} c="#0f0a08"/>{t.adicionarLanc}</button>

        {/* Free vs premium */}
        {!profile?.is_premium&&(<div style={{marginTop:20,background:'linear-gradient(135deg,#1e1005,#160c04)',borderRadius:20,border:'1px solid rgba(212,168,71,0.2)',padding:'18px 16px'}}><div style={{fontFamily:"'Playfair Display',serif",fontSize:17,color:'#d4a847',marginBottom:4}}>{t.querMaisCtrl}</div><div style={{fontSize:12,color:'#7a5545',marginBottom:16,lineHeight:1.6}}>{t.vejaPremium}</div><div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:0,background:'rgba(0,0,0,0.3)',borderRadius:14,overflow:'hidden',border:'1px solid rgba(212,168,71,0.1)'}}><div style={{padding:'12px 14px',borderRight:'1px solid rgba(212,168,71,0.1)'}}><div style={{fontSize:11,fontWeight:700,color:'#7a5545',textTransform:'uppercase',letterSpacing:'0.06em',marginBottom:12}}>Gratuito</div>{t.freeFeatures.map(f=><div key={f} style={{display:'flex',alignItems:'center',gap:6,marginBottom:7}}><div style={{width:5,height:5,borderRadius:'50%',background:'#5a3525',flexShrink:0}}/><span style={{fontSize:11,color:'#7a5545'}}>{f}</span></div>)}</div><div style={{padding:'12px 14px',background:'rgba(212,168,71,0.04)'}}><div style={{fontSize:11,fontWeight:700,color:'#d4a847',textTransform:'uppercase',letterSpacing:'0.06em',marginBottom:12,display:'flex',alignItems:'center',gap:5}}><Icon n="star" s={11} c="#d4a847" filled/>Premium</div>{t.premFeatures.map(f=><div key={f} style={{display:'flex',alignItems:'center',gap:6,marginBottom:7}}><div style={{width:5,height:5,borderRadius:'50%',background:'#d4a847',flexShrink:0}}/><span style={{fontSize:11,color:'#c8a090'}}>{f}</span></div>)}</div></div><button onClick={()=>window.open(lang!=='pt'?STRIPE_LINK_INTL:STRIPE_LINK,'_blank')} style={{width:'100%',background:'linear-gradient(135deg,#d4a847,#c49030)',color:'#0f0a08',border:'none',borderRadius:13,padding:'12px',fontSize:14,fontWeight:700,cursor:'pointer',marginTop:14,display:'flex',alignItems:'center',justifyContent:'center',gap:7}}><Icon n="star" s={14} c="#0f0a08" filled/>{t.assinarPor(lang!=='pt'?PRECO_INTL:PRECO)}</button><div style={{textAlign:'center',fontSize:11,color:'#5a3525',marginTop:8}}>{t.cancelarQuando}</div></div>)}
      </div>
    );
  };

  /* ============================================================ MODAL EDITAR TX ============================================================ */
  const ModalEditar=({tx,onSave,onCancel})=>{
    const {lang,t}=useLang();const cur=LANGS[lang].currency;
    const [tipo,setTipo]=useState(tx.tipo);const [valor,setValor]=useState(String(tx.valor));const [categoria,setCategoria]=useState(tx.categoria);const [descricao,setDescricao]=useState(tx.descricao||'');const [data,setData]=useState(tx.data);const [loading,setLoading]=useState(false);
    const cats={gasto:t.catsGasto,receita:t.catsReceita,divida:t.catsDivida};
    const iS={width:'100%',background:'rgba(0,0,0,0.4)',border:'1px solid rgba(212,168,71,0.18)',borderRadius:12,padding:'11px 13px',color:'#e8d4c8',fontSize:14,outline:'none',fontFamily:'Nunito',marginBottom:10};
    const handleSave=async()=>{if(!valor||!categoria)return;setLoading(true);await onSave(tx.id,{tipo,valor:parseFloat(valor),categoria,descricao,data});setLoading(false);};
    return(<div style={{position:'fixed',inset:0,background:'rgba(0,0,0,0.75)',zIndex:200,display:'flex',alignItems:'flex-end',justifyContent:'center'}}><div style={{background:'#1e1208',borderRadius:'20px 20px 0 0',border:'1px solid rgba(212,168,71,0.2)',padding:20,width:'100%',maxWidth:480,animation:'slideUp 0.3s ease',maxHeight:'90vh',overflowY:'auto'}}><div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:16}}><div style={{fontFamily:"'Playfair Display',serif",fontSize:18,color:'#e8d4c8'}}>{t.editarLanc}</div><button onClick={onCancel} style={{background:'none',border:'none',cursor:'pointer',color:'#7a5545',fontSize:20}}>✕</button></div><div style={{display:'flex',gap:8,marginBottom:14}}>{[['gasto',t.labelGasto,'#d44747'],['receita',t.labelReceita,'#5cba7d']].map(([tp,l,cor])=>(<button key={tp} onClick={()=>{setTipo(tp);setCategoria('');}} style={{flex:1,padding:'10px',borderRadius:12,border:`1.5px solid ${tipo===tp?cor:'rgba(212,168,71,0.12)'}`,background:tipo===tp?cor+'25':'transparent',color:tipo===tp?cor:'#7a5545',fontSize:13,fontWeight:700,cursor:'pointer'}}>{l}</button>))}</div><div style={{fontSize:11,color:'#7a5545',marginBottom:4}}>{t.valorLabel} ({cur})</div><input style={{...iS,fontSize:20,fontWeight:700}} type="number" inputMode="decimal" value={valor} onChange={e=>setValor(e.target.value)}/><div style={{fontSize:11,color:'#7a5545',marginBottom:6,marginTop:4}}>{t.catLabel}</div><div style={{display:'flex',flexWrap:'wrap',gap:5,marginBottom:12}}>{(cats[tipo]||cats.gasto).map(c=><button key={c} onClick={()=>setCategoria(c)} style={{padding:'5px 11px',borderRadius:20,border:`1px solid ${categoria===c?'#d4a847':'rgba(212,168,71,0.12)'}`,background:categoria===c?'rgba(212,168,71,0.15)':'transparent',color:categoria===c?'#d4a847':'#7a5545',fontSize:11,cursor:'pointer'}}>{c}</button>)}</div><div style={{fontSize:11,color:'#7a5545',marginBottom:4}}>{t.descLabel}</div><input style={iS} placeholder={t.descPh} value={descricao} onChange={e=>setDescricao(e.target.value)}/><div style={{fontSize:11,color:'#7a5545',marginBottom:4}}>{t.dataLabel}</div><input style={{...iS,marginBottom:16}} type="date" value={data} onChange={e=>setData(e.target.value)}/><button onClick={handleSave} disabled={loading} style={{width:'100%',background:'linear-gradient(135deg,#d4a847,#c49030)',color:'#0f0a08',border:'none',borderRadius:13,padding:'13px',fontSize:15,fontWeight:700,cursor:'pointer'}}>{loading?t.salvando:t.salvarAlter}</button></div></div>);
  };

  /* ============================================================ GASTOS SCREEN — com dívidas recorrentes ============================================================ */
  const GastosScreen=({transacoes,dividas,onAdd,onDelete,onEdit,onAddDivida,onDeleteDivida,onQuitarDivida,onCalc})=>{
    const {lang,t}=useLang();const cur=LANGS[lang].currency;const fmt=v=>fmtMoney(v,cur);
    const [showForm,setShowForm]=useState(false);const [tipo,setTipo]=useState('gasto');const [valor,setValor]=useState('');const [categoria,setCategoria]=useState('');const [showCalcBtn,setShowCalcBtn]=useState(false);const [descricao,setDescricao]=useState('');const [data,setData]=useState(hoje());const [loading,setLoading]=useState(false);
    const [filtro,setFiltro]=useState('todos');const [confirmId,setConfirmId]=useState(null);const [editTx,setEditTx]=useState(null);
    const [showDivForm,setShowDivForm]=useState(false);const [divNome,setDivNome]=useState('');const [divValor,setDivValor]=useState('');const [divParcelas,setDivParcelas]=useState('');const [divVenc,setDivVenc]=useState('');const [divCat,setDivCat]=useState('');const [savingDiv,setSavingDiv]=useState(false);
    const [confirmDivId,setConfirmDivId]=useState(null);

    const handleAdd=async()=>{if(!valor||!categoria)return;setLoading(true);await onAdd({tipo,valor:parseFloat(valor.replace(',','.')),categoria,descricao,data});setValor('');setCategoria('');setDescricao('');setData(hoje());setShowForm(false);setLoading(false);};
    const handleAddDivida=async()=>{if(!divNome||!divValor||!divVenc)return;setSavingDiv(true);await onAddDivida({nome:divNome,categoria:divCat||'Outros',valor_parcela:parseFloat(divValor),total_parcelas:divParcelas?parseInt(divParcelas):null,parcelas_pagas:0,vencimento:parseInt(divVenc),quitada:false});setDivNome('');setDivValor('');setDivParcelas('');setDivVenc('');setDivCat('');setShowDivForm(false);setSavingDiv(false);};
    const txFiltradas=filtro==='todos'?transacoes:transacoes.filter(tx=>tx.tipo===filtro);
    const iS={width:'100%',background:'rgba(0,0,0,0.3)',border:'1px solid rgba(212,168,71,0.18)',borderRadius:12,padding:'12px 14px',color:'#e8d4c8',fontSize:15,outline:'none',fontFamily:'Nunito',marginBottom:12};
    return(
      <div style={{padding:'20px 16px 100px',animation:'fadeIn 0.3s ease'}}>
        {confirmId&&<ModalConfirm msg={t.confirmarExcl} onConfirm={async()=>{await onDelete(confirmId);setConfirmId(null);}} onCancel={()=>setConfirmId(null)}/>}
        {confirmDivId&&<ModalConfirm msg="Excluir esta dívida?" onConfirm={async()=>{await onDeleteDivida(confirmDivId);setConfirmDivId(null);}} onCancel={()=>setConfirmDivId(null)}/>}
        {editTx&&<ModalEditar tx={editTx} onSave={async(id,dados)=>{await onEdit(id,dados);setEditTx(null);}} onCancel={()=>setEditTx(null)}/>}

        <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:20}}>
          <div style={{fontFamily:"'Playfair Display',serif",fontSize:22,color:'#e8d4c8'}}>{t.meusGastos}</div>
          <button onClick={()=>{setShowForm(!showForm);setShowDivForm(false);}} style={{background:showForm?'rgba(212,71,71,0.15)':'rgba(212,168,71,0.12)',border:`1px solid ${showForm?'rgba(212,71,71,0.3)':'rgba(212,168,71,0.25)'}`,borderRadius:10,padding:'8px 14px',color:showForm?'#d44747':'#d4a847',fontSize:13,fontWeight:600,cursor:'pointer'}}>
            {showForm?t.fechar:t.novo}
          </button>
          {onCalc&&<button onClick={onCalc} style={{background:'rgba(212,168,71,0.08)',border:'1px solid rgba(212,168,71,0.2)',borderRadius:10,padding:'8px 12px',color:'#d4a847',fontSize:12,fontWeight:700,cursor:'pointer',whiteSpace:'nowrap'}}>🧮 Calcular</button>}
        </div>

        {/* FORM DE LANÇAMENTO NORMAL */}
        {showForm&&(
          <div style={{background:'#1a1008',borderRadius:18,border:'1px solid rgba(212,168,71,0.2)',padding:18,marginBottom:16,animation:'slideUp 0.3s ease'}}>
            <div style={{display:'flex',gap:8,marginBottom:16}}>
              {[['gasto',t.labelGasto,'#d44747'],['receita',t.labelReceita,'#5cba7d']].map(([tp,l,cor])=>(
                <button key={tp} onClick={()=>{setTipo(tp);setCategoria('');}} style={{flex:1,padding:'11px',borderRadius:12,border:`1.5px solid ${tipo===tp?cor:'rgba(212,168,71,0.12)'}`,background:tipo===tp?cor+'25':'transparent',color:tipo===tp?cor:'#7a5545',fontSize:14,fontWeight:700,cursor:'pointer'}}>{l}</button>
              ))}
            </div>
            <div style={{fontSize:12,color:'#7a5545',marginBottom:5}}>{t.valorLabel} ({cur})</div>
            <input style={{...iS,fontSize:22,fontWeight:700,marginBottom:14}} type="number" inputMode="decimal" placeholder="0,00" value={valor} onChange={e=>setValor(e.target.value)}/>
            <div style={{fontSize:12,color:'#7a5545',marginBottom:8}}>{t.catLabel}</div>
            <div style={{display:'flex',flexWrap:'wrap',gap:6,marginBottom:14}}>
              {cats[tipo].map(c=><button key={c} onClick={()=>setCategoria(c)} style={{padding:'6px 12px',borderRadius:20,border:`1px solid ${categoria===c?'#d4a847':'rgba(212,168,71,0.12)'}`,background:categoria===c?'rgba(212,168,71,0.15)':'transparent',color:categoria===c?'#d4a847':'#7a5545',fontSize:12,fontWeight:500,cursor:'pointer'}}>{c}</button>)}
            </div>
            <div style={{fontSize:12,color:'#7a5545',marginBottom:5}}>{t.descLabel}</div>
            <input style={iS} placeholder={t.descPh} value={descricao} onChange={e=>setDescricao(e.target.value)}/>
            <div style={{fontSize:12,color:'#7a5545',marginBottom:5}}>{t.dataLabel}</div>
            <input style={{...iS,marginBottom:18}} type="date" value={data} onChange={e=>setData(e.target.value)}/>
            <button onClick={handleAdd} disabled={loading||!valor||!categoria} style={{width:'100%',background:(!valor||!categoria)?'rgba(212,168,71,0.25)':'linear-gradient(135deg,#d4a847,#c49030)',color:'#0f0a08',border:'none',borderRadius:13,padding:'13px',fontSize:15,fontWeight:700,cursor:(!valor||!categoria)?'not-allowed':'pointer'}}>
              {loading?t.salvando:t.salvarLanc}
            </button>
          </div>
        )}

        {/* SEÇÃO DE DÍVIDAS RECORRENTES */}
        <div style={{marginBottom:16}}>
          <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:12}}>

              <Icon n="alert" s={15} c="#d44747"/>{t.dividasTitle}
            </div>
            <button onClick={()=>{setShowDivForm(!showDivForm);setShowForm(false);}} style={{background:'rgba(212,71,71,0.1)',border:'1px solid rgba(212,71,71,0.25)',borderRadius:10,padding:'6px 12px',color:'#d44747',fontSize:12,fontWeight:600,cursor:'pointer'}}>
              {showDivForm?t.fechar:t.addDivida}
            </button>
          </div>

          {/* Form dívida */}
          {showDivForm&&(
            <div style={{background:'rgba(212,71,71,0.05)',borderRadius:16,border:'1px solid rgba(212,71,71,0.2)',padding:16,marginBottom:12,animation:'slideUp 0.3s ease'}}>
              <div style={{fontSize:12,color:'#d44747',marginBottom:5,fontWeight:700}}>⚠️ Nova Dívida Recorrente</div>
              <div style={{fontSize:11,color:'#7a5545',marginBottom:5}}>{t.nomeDivida}</div>
              <input style={iS} placeholder="Ex: Aluguel, Empréstimo, Faculdade..." value={divNome} onChange={e=>setDivNome(e.target.value)}/>
              <div style={{fontSize:11,color:'#7a5545',marginBottom:8}}>Categoria</div>

                {t.catsDivida.map(c=><button key={c} onClick={()=>setDivCat(c)} style={{padding:'5px 10px',borderRadius:20,border:`1px solid ${divCat===c?'#d44747':'rgba(212,71,71,0.15)'}`,background:divCat===c?'rgba(212,71,71,0.15)':'transparent',color:divCat===c?'#d44747':'#7a5545',fontSize:11,cursor:'pointer'}}>{c}</button>)}
              </div>
              <div style={{fontSize:11,color:'#7a5545',marginBottom:5}}>{t.valorParcela} ({cur})</div>
              <input style={{...iS,fontSize:18,fontWeight:700}} type="number" inputMode="decimal" placeholder="0,00" value={divValor} onChange={e=>setDivValor(e.target.value)}/>
              <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:10,marginBottom:12}}>

                  <div style={{fontSize:11,color:'#7a5545',marginBottom:5}}>{t.numParcelas}</div>

                {savingDiv?t.salvando:t.criarDivida}
              </button>
            </div>
          )}

  const CalculadoraModal=({onClose})=>{
    const {t,lang}=useLang();
    const cur=LANGS[lang].currency;
    const [divida,setDivida]=useState('');
    const [juros,setJuros]=useState('');
    const [parcelas,setParcelas]=useState('');
    const [result,setResult]=useState(null);
    const calcular=()=>{
      const pv=parseFloat(divida.replace(',','.'));
      const r=parseFloat(juros.replace(',','.'))/100;
      const n=parseInt(parcelas);
      if(!pv||!n||isNaN(pv)||isNaN(n)||pv<=0||n<=0)return;
      let parcela,totalPago;
      if(!r||r===0){parcela=pv/n;totalPago=pv;}
      else{parcela=pv*(r*Math.pow(1+r,n))/(Math.pow(1+r,n)-1);totalPago=parcela*n;}
      const totalJuros=totalPago-pv;
      setResult({parcela,totalPago,totalJuros,pct:((totalJuros/pv)*100).toFixed(1)});
    };
    const fmt=v=>v.toLocaleString('pt-BR',{minimumFractionDigits:2,maximumFractionDigits:2});
    const iS={width:'100%',background:'rgba(255,255,255,0.04)',border:'1px solid rgba(212,168,71,0.18)',borderRadius:10,padding:'12px 14px',color:'#e8d4c8',fontSize:15,outline:'none',fontFamily:'Nunito',marginBottom:10};
    return(
      <div style={{position:'fixed',inset:0,background:'rgba(0,0,0,0.85)',zIndex:200,display:'flex',alignItems:'flex-end',justifyContent:'center'}} onClick={e=>{if(e.target===e.currentTarget)onClose();}}>
        <div style={{background:'#1a1008',borderRadius:'20px 20px 0 0',border:'1px solid rgba(212,168,71,0.25)',padding:24,width:'100%',maxWidth:480,paddingBottom:40,animation:'slideUp 0.3s ease'}}>
          <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:20}}>
            <div>
              <div style={{fontFamily:"'Playfair Display',serif",fontSize:18,color:'#d4a847'}}>{t.calcTitle||'Calculadora de Dívida'}</div>
              <div style={{fontSize:11,color:'#7a5545',marginTop:2}}>{t.calcSub||'Descubra quanto vai pagar no total'}</div>
            </div>
            <button onClick={onClose} style={{background:'none',border:'none',color:'#7a5545',fontSize:20,cursor:'pointer',padding:4}}>✕</button>
          </div>
          <input type="number" inputMode="decimal" placeholder={t.calcDivida||'Valor da dívida (R$)'} value={divida} onChange={e=>setDivida(e.target.value)} style={iS}/>
          <input type="number" inputMode="decimal" placeholder={t.calcJuros||'Juros ao mês (%) — deixe vazio se não tiver'} value={juros} onChange={e=>setJuros(e.target.value)} style={iS}/>
          <input type="number" inputMode="numeric" placeholder={t.calcParcelas||'Número de parcelas'} value={parcelas} onChange={e=>setParcelas(e.target.value)} style={iS}/>
          <div style={{display:'flex',gap:10,marginTop:4}}>
            <button onClick={calcular} style={{flex:1,background:'linear-gradient(135deg,#c8784a,#a05830)',border:'none',borderRadius:12,padding:'13px',color:'white',fontSize:14,fontWeight:700,cursor:'pointer'}}>
              {t.calcBtnCalc||'Calcular'}
            </button>
            <button onClick={()=>{setDivida('');setJuros('');setParcelas('');setResult(null);}} style={{background:'rgba(255,255,255,0.05)',border:'1px solid rgba(255,255,255,0.1)',borderRadius:12,padding:'13px 16px',color:'#7a5545',fontSize:13,cursor:'pointer'}}>
              {t.calcBtnLimpar||'Limpar'}
            </button>
          </div>
          {result&&(
            <div style={{marginTop:18,background:'rgba(212,168,71,0.06)',border:'1px solid rgba(212,168,71,0.2)',borderRadius:14,padding:18,animation:'fadeIn 0.3s ease'}}>
              <div style={{display:'grid',gridTemplateColumns:'1fr 1fr 1fr',gap:12,marginBottom:14}}>
                <div style={{textAlign:'center'}}>
                  <div style={{fontSize:10,color:'#7a5545',textTransform:'uppercase',letterSpacing:'0.05em',marginBottom:4}}>{t.calcValorParcela||'Parcela'}</div>
                  <div style={{fontFamily:"'Playfair Display',serif",fontSize:18,color:'#d4a847',fontWeight:700}}>{cur}{fmt(result.parcela)}</div>
                </div>
                <div style={{textAlign:'center',borderLeft:'1px solid rgba(212,168,71,0.15)',borderRight:'1px solid rgba(212,168,71,0.15)',padding:'0 8px'}}>
                  <div style={{fontSize:10,color:'#7a5545',textTransform:'uppercase',letterSpacing:'0.05em',marginBottom:4}}>{t.calcTotalPagar||'Total'}</div>
                  <div style={{fontFamily:"'Playfair Display',serif",fontSize:18,color:'#e8d4c8',fontWeight:700}}>{cur}{fmt(result.totalPago)}</div>
                </div>
                <div style={{textAlign:'center'}}>
                  <div style={{fontSize:10,color:'#7a5545',textTransform:'uppercase',letterSpacing:'0.05em',marginBottom:4}}>{t.calcTotalJuros||'Juros'}</div>
                  <div style={{fontFamily:"'Playfair Display',serif",fontSize:18,color:'#e07070',fontWeight:700}}>{cur}{fmt(result.totalJuros)}</div>
                </div>
              </div>
              {result.pct>0&&<div style={{fontSize:12,color:'#e07070',textAlign:'center',padding:'8px 12px',background:'rgba(220,80,80,0.07)',borderRadius:8}}>
                {t.calcAviso||'⚠️ Os juros representam'} <strong>{result.pct}%</strong> do valor original.
              </div>}
            </div>
          )}
        </div>
      </div>
    );
  };

  const DesafioScreen=({userId})=>{
    const {t,lang}=useLang();

    const SEMANAS=Array.from({length:52},(_,i)=>i+1);
    const totalMeta=SEMANAS.reduce((a,b)=>a+b,0);

      try{const s=localStorage.getItem(LS_KEY);return s?JSON.parse(s):{};}catch{return {};}
    });
    const [showZerar,setShowZerar]=useState(false);
    const toggle=w=>{
      setChecked(prev=>{const n={...prev};if(n[w])delete n[w];else n[w]=true;
        try{localStorage.setItem(LS_KEY,JSON.stringify(n));}catch{}return n;
      });
    };
    const totalGuardado=SEMANAS.filter(w=>checked[w]).reduce((a,b)=>a+b,0);
    const pct=Math.round((totalGuardado/totalMeta)*100);
    const semanasFeitas=SEMANAS.filter(w=>checked[w]).length;

      const msg=t.whatsappDesafio?t.whatsappDesafio(semanasFeitas,fmt(totalGuardado)):`Já completei ${semanasFeitas} semanas do Desafio 52 Semanas e guardei R$${fmt(totalGuardado)}! 🎯 https://www.licaodemulher.com.br`;
      window.open('https://wa.me/?text='+encodeURIComponent(msg),'_blank');
    };
    const zerar=()=>{
      setChecked({});
      try{localStorage.removeItem(LS_KEY);}catch{}
      setShowZerar(false);

    return(
      <div style={{padding:'0 0 100px',background:'#0f0a08',minHeight:'100vh'}}>

                <div style={{fontSize:10,color:'#7a5545',textTransform:'uppercase',letterSpacing:'0.06em',marginBottom:3}}>{t.desafioGuardado||'Guardado até agora'}</div>
                <div style={{fontFamily:"'Playfair Display',serif",fontSize:28,color:'#d4a847',fontWeight:700}}>R$ {fmt(totalGuardado)}</div>

              <div style={{height:'100%',width:pct+'%',background:'linear-gradient(90deg,#c8784a,#d4a847)',borderRadius:4,transition:'width 0.5s ease'}}/>
            </div>
            <div style={{fontSize:10,color:'#7a5545',marginTop:6,textAlign:'right'}}>{t.desafioMeta||'Meta total: R$ 1.378,00'}</div>
          </div>

            <button onClick={compartilhar} style={{flex:1,background:'#25D366',border:'none',borderRadius:12,padding:'11px',color:'white',fontSize:13,fontWeight:700,cursor:'pointer',display:'flex',alignItems:'center',justifyContent:'center',gap:6}}>
              💬 {t.desafioCompartilhar||'Compartilhar no WhatsApp'}
            </button>
            <button onClick={()=>setShowZerar(true)} style={{background:'rgba(255,255,255,0.04)',border:'1px solid rgba(255,255,255,0.08)',borderRadius:12,padding:'11px 14px',color:'#7a5545',fontSize:12,cursor:'pointer'}}>↺</button>
          </div>
        </div>

        {/* 52 weeks grid */}
        <div style={{padding:'0 12px',display:'grid',gridTemplateColumns:'repeat(4,1fr)',gap:7}}>
          {SEMANAS.map(w=>{
            const done=!!checked[w];
            return(
              <button key={w} onClick={()=>toggle(w)} style={{background:done?'rgba(212,168,71,0.15)':'#1a1210',border:`1px solid ${done?'rgba(212,168,71,0.4)':'rgba(255,255,255,0.06)'}`,borderRadius:10,padding:'10px 6px',cursor:'pointer',transition:'all 0.15s',display:'flex',flexDirection:'column',alignItems:'center',gap:2}}>
                <div style={{fontSize:9,color:done?'#d4a847':'#5a3525',fontWeight:700,textTransform:'uppercase'}}>{t.desafioSemana||'Sem.'}{w}</div>
                <div style={{fontFamily:"'Playfair Display',serif",fontSize:13,color:done?'#d4a847':'#7a5545',fontWeight:700}}>R${w}</div>
                <div style={{fontSize:14,lineHeight:1}}>{done?'✅':'◻️'}</div>
              </button>
            );
          })}
        </div>

        {showZerar&&(
          <div style={{position:'fixed',inset:0,background:'rgba(0,0,0,0.8)',zIndex:200,display:'flex',alignItems:'center',justifyContent:'center',padding:24}}>
            <div style={{background:'#1a1008',borderRadius:16,padding:24,maxWidth:300,width:'100%',textAlign:'center',border:'1px solid rgba(212,168,71,0.2)'}}>
              <div style={{fontSize:32,marginBottom:12}}>⚠️</div>
              <div style={{fontSize:15,color:'#e8d4c8',fontWeight:700,marginBottom:8}}>Reiniciar desafio?</div>
              <div style={{fontSize:12,color:'#7a5545',marginBottom:20}}>Todo o progresso será perdido.</div>
              <div style={{display:'flex',gap:10}}>
                <button onClick={()=>setShowZerar(false)} style={{flex:1,background:'rgba(255,255,255,0.05)',border:'1px solid rgba(255,255,255,0.1)',borderRadius:10,padding:'11px',color:'#c8a090',cursor:'pointer',fontSize:13}}>Cancelar</button>
                <button onClick={zerar} style={{flex:1,background:'rgba(200,80,80,0.2)',border:'1px solid rgba(200,80,80,0.3)',borderRadius:10,padding:'11px',color:'#f07070',cursor:'pointer',fontSize:13,fontWeight:700}}>Reiniciar</button>
              </div>
            </div>
          </div>
        )}
      </div>
    );
  };


  const abrirWhatsApp = (msg) => {
    window.open('https://wa.me/?text=' + encodeURIComponent(msg), '_blank');
  };

const App=()=>{
    const [lang,setLangState]=useState(()=>{const s=localStorage.getItem('ldm_lang');return(s&&LANGS[s])?s:'pt';});
    const [langChosen,setLangChosen]=useState(()=>!!localStorage.getItem('ldm_lang_chosen'));
    const [showLangModal,setShowLangModal]=useState(false);
    const setLang=key=>{if(!LANGS[key])return;setLangState(key);localStorage.setItem('ldm_lang',key);setLangChosen(true);localStorage.setItem('ldm_lang_chosen','1');if(user?.id)sb.from('profiles').update({lang:key}).eq('id',user.id).then(()=>{});};
    const t=LANGS[lang];
    const [showLanding,setShowLanding]=useState(true);
    const [user,setUser]=useState(null);const [profile,setProfile]=useState(null);const [tab,setTab]=useState('home');
    const [transacoes,setTransacoes]=useState([]);const [metas,setMetas]=useState([]);const [envelopes,setEnvelopes]=useState([]);const [dividas,setDividas]=useState([]);
    const [loading,setLoading]=useState(true);const [deferredPrompt,setDeferredPrompt]=useState(null);const [showInstall,setShowInstall]=useState(false);
    const [recoveryMode,setRecoveryMode]=useState(false);const [novaSenha,setNovaSenha]=useState('');const [novaSenhaMsg,setNovaSenhaMsg]=useState('');const [novaSenhaErro,setNovaSenhaErro]=useState('');const [novaSenhaLoading,setNovaSenhaLoading]=useState(false);const [showSenha,setShowSenha]=useState(false);
    const [creditos,setCreditos]=useState(0);const [sequencia,setSequencia]=useState(0);const [desbloqueados,setDesbloqueados]=useState({});const [creditosToast,setCreditosToast]=useState(null);
    const [showLoja,setShowLoja]=useState(false);const [showMemoria,setShowMemoria]=useState(false);const [showCalc,setShowCalc]=useState(false);
    const isPremium=profile?.is_premium||false;

    useEffect(()=>{const h=e=>{e.preventDefault();setDeferredPrompt(e);setShowInstall(true);};window.addEventListener('beforeinstallprompt',h);return()=>window.removeEventListener('beforeinstallprompt',h);},[]);
    const handleInstall=async()=>{if(!deferredPrompt)return;deferredPrompt.prompt();const{outcome}=await deferredPrompt.userChoice;if(outcome==='accepted')setShowInstall(false);setDeferredPrompt(null);};
    const handleAtualizarSenha=async()=>{setNovaSenhaErro('');setNovaSenhaMsg('');if(!novaSenha||novaSenha.length<6){setNovaSenhaErro(t.senhaMinErro);return;}setNovaSenhaLoading(true);try{const{error}=await sb.auth.updateUser({password:novaSenha});if(error)throw error;setNovaSenhaMsg(t.senhaOk);setTimeout(()=>{setRecoveryMode(false);sb.auth.signOut();},2000);}catch(e){setNovaSenhaErro(t.senhaErro);}setNovaSenhaLoading(false);};

    /* Créditos */
    const darCreditos=async(uid,qtd,motivo)=>{try{const{data:p}=await sb.from('profiles').select('creditos').eq('id',uid).maybeSingle();const atual=(p?.creditos||0);await sb.from('profiles').update({creditos:atual+qtd}).eq('id',uid);setCreditos(atual+qtd);setCreditosToast(t.creditosGanhos(qtd,motivo));}catch(e){}};
    const verificarLoginDiario=async(uid,perfilData)=>{
      try{
        /* Busca dados frescos do banco para evitar estado desatualizado */
        const{data:p}=await sb.from('profiles').select('creditos,ultimo_login_credito,sequencia_login').eq('id',uid).maybeSingle();
        const dados=p||perfilData||{};
        const hojeStr=hoje();
        const ultimoLogin=(dados.ultimo_login_credito||'').slice(0,10);
        if(ultimoLogin===hojeStr)return; /* já ganhou hoje */
        const ontem=new Date();ontem.setDate(ontem.getDate()-1);
        const ontemStr=ontem.toISOString().slice(0,10);
        let seq=(dados.sequencia_login||0);
        if(ultimoLogin===ontemStr){seq++;}else{seq=1;} /* se pulou um dia, reinicia */
        let bonus=CREDITOS_CONFIG.login_diario;
        let motivo=t.loginDiario||'Login diário';
        if(seq===7){bonus+=CREDITOS_CONFIG.sequencia_7;motivo=t.streakBonus7||'🎉 7 dias seguidos!';}
        if(seq===30){bonus+=CREDITOS_CONFIG.sequencia_30;motivo=t.streakBonus30||'🏆 30 dias!';}
        const novosCred=(dados.creditos||0)+bonus;
        await sb.from('profiles').update({creditos:novosCred,ultimo_login_credito:hojeStr,sequencia_login:seq}).eq('id',uid);
        setCreditos(novosCred);setSequencia(seq);
        setCreditosToast(t.creditosGanhos(bonus,motivo));
      }catch(e){console.error('verificarLoginDiario:',e);}
    };
    const gastarCreditos=async(custo,itemId,callback)=>{if(creditos<custo)return;const novos=creditos-custo;const key=`${lang}_${itemId}`;const novosDesbloqueados={...desbloqueados,[key]:true};setCreditos(novos);setDesbloqueados(novosDesbloqueados);if(user?.id){await sb.from('profiles').update({creditos:novos,desbloqueados:novosDesbloqueados}).eq('id',user.id);}if(callback)callback();};

    useEffect(()=>{sb.auth.getSession().then(({data})=>{if(data.session?.user){setUser(data.session.user);loadAll(data.session.user.id);}else setLoading(false);});const{data:listener}=sb.auth.onAuthStateChange((ev,session)=>{if(ev==='PASSWORD_RECOVERY'){setRecoveryMode(true);setLoading(false);return;}if(session?.user){setUser(session.user);loadAll(session.user.id);}else{setUser(null);setProfile(null);setLoading(false);}});return()=>listener.subscription.unsubscribe();},[]);

    const loadAll=async(uid)=>{
      try{
        const[p,tx,mt,env,div]=await Promise.all([
          sb.from('profiles').select('*').eq('id',uid).maybeSingle(),
          sb.from('transacoes').select('*').eq('user_id',uid).order('data',{ascending:false}).order('created_at',{ascending:false}),
          sb.from('metas').select('*').eq('user_id',uid).order('created_at',{ascending:false}),
          sb.from('envelopes').select('*').eq('user_id',uid).eq('mes_ano',mesAtual()).order('created_at',{ascending:false}),
          sb.from('dividas').select('*').eq('user_id',uid).eq('quitada',false).order('created_at',{ascending:false}),
        ]);
        let perfilData=p.data;
        if(!perfilData){const{data:sess}=await sb.auth.getSession();const u=sess?.session?.user;const nome=u?.user_metadata?.nome||u?.email?.split('@')[0]||'Usuária';const userLang=u?.user_metadata?.lang||lang;const{data:newP}=await sb.from('profiles').insert({id:uid,nome,email:u?.email||'',lang:userLang,creditos:CREDITOS_CONFIG.boas_vindas,sequencia_login:1,ultimo_login_credito:hoje()}).select().maybeSingle();if(newP){setProfile(newP);setLang(userLang);setCreditos(newP.creditos||CREDITOS_CONFIG.boas_vindas);setCreditosToast(t.creditosGanhos(CREDITOS_CONFIG.boas_vindas,t.boasBoas));perfilData=newP;}}else{setProfile(perfilData);if(perfilData.lang&&LANGS[perfilData.lang])setLang(perfilData.lang);setCreditos(perfilData.creditos||0);setSequencia(perfilData.sequencia_login||0);setDesbloqueados(perfilData.desbloqueados||{});if(perfilData.is_premium){const ultimoPremium=perfilData.ultimo_credito_premium||'';if(!ultimoPremium.startsWith(mesAtual())){const novosCred=(perfilData.creditos||0)+CREDITOS_CONFIG.premium_mensal;await sb.from('profiles').update({creditos:novosCred,ultimo_credito_premium:hoje()}).eq('id',uid);setCreditos(novosCred);setCreditosToast(t.creditosGanhos(CREDITOS_CONFIG.premium_mensal,'Premium mensal 🌟'));}}setTimeout(()=>verificarLoginDiario(uid,perfilData),1500);}
        setTransacoes(tx.data||[]);setMetas(mt.data||[]);setEnvelopes(env.data||[]);
        setDividas(div.data||[]);
      }catch(e){console.error('loadAll',e);}
      setLoading(false);
    };

    const handleLogout=async()=>{await sb.auth.signOut();setUser(null);setProfile(null);setTransacoes([]);setMetas([]);setEnvelopes([]);setDividas([]);setCreditos(0);setSequencia(0);};
    const handleUpgrade=()=>window.open(lang!=='pt'?STRIPE_LINK_INTL:STRIPE_LINK,'_blank');
    const handleActivatePremium=async(cod)=>{const{data}=await sb.from('codigos_premium').select('*').eq('codigo',cod).eq('usado',false).maybeSingle();if(data){await sb.from('codigos_premium').update({usado:true,usado_por:user.id,usado_em:new Date().toISOString()}).eq('id',data.id);await sb.from('profiles').update({is_premium:true,premium_since:new Date().toISOString()}).eq('id',user.id);setProfile(p=>({...p,is_premium:true}));return true;}return false;};

    /* CRUD */
    const addTransacao=async(tx)=>{const{data}=await sb.from('transacoes').insert({...tx,user_id:user.id}).select().single();if(data)setTransacoes(p=>[data,...p]);};
    const delTransacao=async(id)=>{await sb.from('transacoes').delete().eq('id',id);setTransacoes(p=>p.filter(tx=>tx.id!==id));};
    const editTransacao=async(id,dados)=>{const{data}=await sb.from('transacoes').update(dados).eq('id',id).select().single();if(data)setTransacoes(p=>p.map(tx=>tx.id===id?data:tx));};
    const addMeta=async(m)=>{const{data}=await sb.from('metas').insert({...m,user_id:user.id}).select().single();if(data)setMetas(p=>[data,...p]);};
    const updMeta=async(id,valor_atual)=>{await sb.from('metas').update({valor_atual}).eq('id',id);setMetas(p=>p.map(m=>m.id===id?{...m,valor_atual}:m));};
    const delMeta=async(id)=>{await sb.from('metas').delete().eq('id',id);setMetas(p=>p.filter(m=>m.id!==id));};
    const addEnvelope=async(e)=>{const{data}=await sb.from('envelopes').insert({...e,user_id:user.id}).select().single();if(data)setEnvelopes(p=>[data,...p]);};
    const updEnvelope=async(id,valor_gasto)=>{await sb.from('envelopes').update({valor_gasto}).eq('id',id);setEnvelopes(p=>p.map(e=>e.id===id?{...e,valor_gasto}:e));};
    const delEnvelope=async(id)=>{await sb.from('envelopes').delete().eq('id',id);setEnvelopes(p=>p.filter(e=>e.id!==id));};
    /* Dívidas */
    const addDivida=async(d)=>{const{data}=await sb.from('dividas').insert({...d,user_id:user.id}).select().single();if(data)setDividas(p=>[data,...p]);};
    const delDivida=async(id)=>{await sb.from('dividas').delete().eq('id',id);setDividas(p=>p.filter(d=>d.id!==id));};
    const quitarDivida=async(id)=>{
      const divida=dividas.find(d=>d.id===id);if(!divida)return;
      const novasPagas=divida.parcelas_pagas+1;
      const quitada=divida.total_parcelas?novasPagas>=divida.total_parcelas:false;
      await sb.from('dividas').update({parcelas_pagas:novasPagas,quitada}).eq('id',id);
      setDividas(p=>p.map(d=>d.id===id?{...d,parcelas_pagas:novasPagas,quitada}:d));
      if(quitada){setDividas(p=>p.filter(d=>d.id!==id));setCreditosToast('🎉 Dívida quitada!');}
    };

    const navItems=[
      {id:'home',icon:'home',label:t.navInicio},
      {id:'gastos',icon:'gastos',label:t.navGastos},
      {id:'metas',icon:'target',label:t.navMetas},
      {id:'envelopes',icon:'envelope2',label:t.navEnvelopes},
      {id:'historias',icon:'film',label:t.navHistorias},
      {id:'conselheiro',icon:'star',label:t.navSofia},
      {id:'perfil',icon:'user',label:t.navPerfil},
      {id:'desafio',icon:'star2',label:t.navDesafio||'Desafio'},
    ];
    const ctxValue={lang,t,setLang,preco:lang!=='pt'?PRECO_INTL:PRECO,stripeLink:lang!=='pt'?STRIPE_LINK_INTL:STRIPE_LINK};

    if(loading)return(<LangCtx.Provider value={ctxValue}><Loading/></LangCtx.Provider>);

    if(recoveryMode)return(<LangCtx.Provider value={ctxValue}><div style={{minHeight:'100vh',display:'flex',alignItems:'center',justifyContent:'center',padding:'24px',background:'#0f0a08'}}><div style={{width:'100%',maxWidth:'400px',background:'#1a1210',borderRadius:'20px',padding:'32px',border:'1px solid #3a2820'}}><div style={{textAlign:'center',marginBottom:'28px'}}><div style={{fontSize:'40px',marginBottom:'12px'}}>🔐</div><h2 style={{fontFamily:'Playfair Display',color:'#e8c4a0',fontSize:'22px',marginBottom:'8px'}}>{t.novaSenhaTitle}</h2><p style={{color:'#a08070',fontSize:'14px'}}>{t.novaSenhaSub}</p></div><div style={{position:'relative',marginBottom:'16px'}}><input type={showSenha?'text':'password'} placeholder={t.novaSenhaPh} value={novaSenha} onChange={e=>setNovaSenha(e.target.value)} style={{width:'100%',padding:'14px 44px 14px 16px',background:'#251815',border:'1px solid #3a2820',borderRadius:'12px',color:'#e8c4a0',fontSize:'16px',outline:'none'}}/><button onClick={()=>setShowSenha(s=>!s)} type="button" style={{position:'absolute',right:'12px',top:'50%',transform:'translateY(-50%)',background:'none',border:'none',cursor:'pointer',fontSize:'18px',padding:'4px'}}>{showSenha?'🙈':'👁️'}</button></div>{novaSenhaErro&&<p style={{color:'#e07070',fontSize:'13px',marginBottom:'12px',textAlign:'center'}}>{novaSenhaErro}</p>}{novaSenhaMsg&&<p style={{color:'#70c070',fontSize:'13px',marginBottom:'12px',textAlign:'center'}}>{novaSenhaMsg}</p>}<button onClick={handleAtualizarSenha} disabled={novaSenhaLoading} style={{width:'100%',padding:'14px',background:'linear-gradient(135deg,#c8784a,#a05830)',border:'none',borderRadius:'12px',color:'white',fontSize:'16px',fontWeight:'700',cursor:'pointer'}}>{novaSenhaLoading?t.salvandoSenha:t.salvarSenha}</button></div></div></LangCtx.Provider>);

    if(!user)return(<LangCtx.Provider value={ctxValue}>{showLangModal&&<LangPickerModal onClose={()=>setShowLangModal(false)}/>}{showLanding?<LandingScreen onEntrar={()=>setShowLanding(false)} onOpenLang={()=>setShowLangModal(true)}/>:<AuthScreen onLogin={u=>{setUser(u);loadAll(u.id);}} onOpenLang={()=>setShowLangModal(true)} langChosen={langChosen} onBack={()=>setShowLanding(true)}/>}</LangCtx.Provider>);

    return(<LangCtx.Provider value={ctxValue}>
      <div style={{background:'#0f0a08',minHeight:'100vh'}}>
        {creditosToast&&<CreditosToast msg={creditosToast} onClose={()=>setCreditosToast(null)}/>}
        {showLoja&&<LojaCreditos onClose={()=>setShowLoja(false)} lang={lang}/>}
        {showCalc&&<CalculadoraModal onClose={()=>setShowCalc(false)}/>}
        {showMemoria&&<MemoriaMes transacoes={transacoes} dividas={dividas} onClose={()=>setShowMemoria(false)}/>}

        {/* Top bar */}
        <div style={{position:'sticky',top:0,zIndex:50,background:'rgba(15,10,8,0.95)',backdropFilter:'blur(10px)',borderBottom:'1px solid rgba(212,168,71,0.08)',padding:'10px 16px',display:'flex',justifyContent:'space-between',alignItems:'center'}}>
          <div style={{fontFamily:"'Playfair Display',serif",fontSize:16,color:'#d4a847'}}>Lição de Mulher</div>
          <div style={{display:'flex',alignItems:'center',gap:8}}>
            <button onClick={()=>setShowLoja(true)} style={{display:'flex',alignItems:'center',gap:4,background:'rgba(212,168,71,0.08)',border:'1px solid rgba(212,168,71,0.2)',borderRadius:20,padding:'3px 10px',cursor:'pointer'}}>
              <span style={{fontSize:13}}>🪙</span><span style={{fontWeight:700,color:'#d4a847',fontSize:13}}>{creditos||0}</span>
            </button>
            <div style={{fontSize:11,color:isPremium?'#d4a847':'#5a3525',background:isPremium?'rgba(212,168,71,0.1)':'rgba(90,53,37,0.15)',border:`1px solid ${isPremium?'rgba(212,168,71,0.2)':'rgba(90,53,37,0.2)'}`,borderRadius:20,padding:'3px 10px',fontWeight:700}}>
              {isPremium?t.premium:t.gratuito}
            </div>
          </div>
        </div>

        {tab==='home'&&<Dashboard profile={profile} transacoes={transacoes} dividas={dividas} onAdd={()=>setTab('gastos')} creditos={creditos} sequencia={sequencia} onOpenLoja={()=>setShowLoja(true)} onOpenMemoria={()=>setShowMemoria(true)} onDesafio={()=>setTab('desafio')}/>}
        {tab==='desafio'&&<DesafioScreen userId={user?.id}/>}
        {tab==='gastos'&&<GastosScreen transacoes={transacoes} dividas={dividas} onAdd={addTransacao} onDelete={delTransacao} onEdit={editTransacao} onAddDivida={addDivida} onDeleteDivida={delDivida} onQuitarDivida={quitarDivida} onCalc={()=>setShowCalc(true)}/>}
        {tab==='metas'&&<MetasScreen metas={metas} onAdd={addMeta} onUpdate={updMeta} onDelete={delMeta} isPremium={isPremium} onUpgrade={handleUpgrade}/>}
        {tab==='envelopes'&&<EnvelopesScreen envelopes={envelopes} onAdd={addEnvelope} onUpdate={updEnvelope} onDelete={delEnvelope} isPremium={isPremium} onUpgrade={handleUpgrade}/>}
        {tab==='historias'&&<HistoriasScreen creditos={creditos} onGastarCreditos={gastarCreditos} desbloqueados={desbloqueados} onOpenLoja={()=>setShowLoja(true)}/>}
        {tab==='conselheiro'&&<ConselheiroScreen isPremium={isPremium} onUpgrade={handleUpgrade} profile={profile}/>}
        {tab==='perfil'&&<PerfilScreen profile={profile} isPremium={isPremium} onLogout={handleLogout} onUpgrade={handleUpgrade} onActivatePremium={handleActivatePremium} creditos={creditos} sequencia={sequencia} onOpenLoja={()=>setShowLoja(true)}/>}

        {showInstall&&(<div style={{position:'fixed',top:0,left:0,right:0,zIndex:9999,background:'linear-gradient(135deg,#2a1810,#1a1008)',borderBottom:'1px solid #d4a847',padding:'10px 16px',display:'flex',alignItems:'center',justifyContent:'space-between'}}><div style={{display:'flex',alignItems:'center',gap:'10px'}}><div style={{fontSize:'28px'}}>🌸</div><div><div style={{color:'#e8c4a0',fontSize:'13px',fontWeight:'700'}}>{t.instalarTitle}</div><div style={{color:'#7a5545',fontSize:'11px'}}>{t.instalarSub}</div></div></div><div style={{display:'flex',gap:'8px'}}><button onClick={()=>setShowInstall(false)} style={{background:'transparent',border:'1px solid #3a2820',borderRadius:'8px',color:'#7a5545',padding:'6px 10px',fontSize:'12px',cursor:'pointer'}}>{t.agoraNao}</button><button onClick={handleInstall} style={{background:'linear-gradient(135deg,#d4a847,#c49030)',border:'none',borderRadius:'8px',color:'#0f0a08',padding:'6px 12px',fontSize:'12px',fontWeight:'700',cursor:'pointer'}}>{t.instalarBtn}</button></div></div>)}

        {/* Bottom nav */}
        <div style={{position:'fixed',bottom:0,left:'50%',transform:'translateX(-50%)',width:'100%',maxWidth:480,background:'#0d0905',borderTop:'1.5px solid rgba(212,168,71,0.22)',display:'flex',padding:'6px 0 max(10px, env(safe-area-inset-bottom))',zIndex:100,boxShadow:'0 -6px 24px rgba(0,0,0,0.7)'}}>
          {navItems.map(item=>{const ativo=tab===item.id;return(<button key={item.id} onClick={()=>setTab(item.id)} style={{flex:1,background:'none',border:'none',cursor:'pointer',display:'flex',flexDirection:'column',alignItems:'center',gap:2,padding:'2px 0',position:'relative'}}>{ativo&&<div style={{position:'absolute',top:-7,left:'50%',transform:'translateX(-50%)',width:24,height:2.5,background:'#d4a847',borderRadius:'0 0 3px 3px'}}/>}<div style={{width:36,height:30,display:'flex',alignItems:'center',justifyContent:'center',borderRadius:10,background:ativo?'rgba(212,168,71,0.16)':'transparent',transition:'all 0.2s'}}><Icon n={item.icon} s={20} c={ativo?'#d4a847':'#8a6040'}/></div><span style={{fontSize:9,color:ativo?'#d4a847':'#8a6040',fontWeight:ativo?700:500,letterSpacing:'-0.2px'}}>{item.label}</span></button>);})}
        </div>
      </div>
    </LangCtx.Provider>);
  };

  ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
