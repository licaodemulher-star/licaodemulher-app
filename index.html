    const AuthScreen = ({ onLogin }) => {

      const [senha, setSenha] = useState('');

      const [erro, setErro] = useState('');
      const [msg, setMsg] = useState('');
      const [showSenha, setShowSenha] = useState(false);

      const errosMsgs = {
        'Invalid login credentials': 'E-mail ou senha incorretos.',
        'User already registered': 'Este e-mail já tem uma conta.',
        'Password should be at least 6 characters': 'Senha: mínimo 6 caracteres.',
        'Unable to validate email address: invalid format': 'E-mail inválido.',
        'Email not confirmed': 'Confirme seu e-mail antes de entrar.',
      };

      const handleEsqueciSenha = async () => {
        setErro(''); setMsg('');
        if (!email) { setErro('Digite seu e-mail acima primeiro.'); return; }
        setLoading(true);
        try {
          const { error } = await sb.auth.resetPasswordForEmail(email, {
            redirectTo: window.location.origin + window.location.pathname,
          });
          if (error) throw error;
          setMsg('Enviamos um link para ' + email + '. Verifique sua caixa de entrada e o spam!');
        } catch (e) {
          setErro('Nao conseguimos enviar o e-mail. Verifique o endereco digitado.');
        }
        setLoading(false);
      };

      const handleAuth = async () => {
        setErro(''); setMsg('');
        if (!email || !senha) { setErro('Preencha todos os campos.'); return; }
        setLoading(true);
        try {
          if (modo === 'cadastro') {
            if (!nome.trim()) { setErro('Digite seu nome.'); setLoading(false); return; }
            const { error } = await sb.auth.signUp({ email, password: senha, options: { data: { nome: nome.trim() } } });
            if (error) throw error;
            setMsg('Conta criada! Verifique seu e-mail para confirmar o cadastro.');
            setModo('login');
          } else {
            const { data, error } = await sb.auth.signInWithPassword({ email, password: senha });
            if (error) throw error;
            onLogin(data.user);
          }
        } catch (e) {
          setErro(errosMsgs[e.message] || 'Algo deu errado. Tente novamente.');
        }
        setLoading(false);
      };

      return (

                  <span style={{ fontSize:'12px', color:'#a08090', textDecoration:'line-through' }}>R$ 47</span>
                  <span style={{ fontSize:'18px', fontWeight:'700', color:'#ff8cc8' }}>R$ 27</span>

              <div style={{ background:'linear-gradient(135deg,#e0356a,#a01040)', borderRadius:'10px', padding:'8px 12px', flexShrink:0, textAlign:'center' }}>
                <div style={{ fontSize:'11px', color:'white', fontWeight:'700' }}>Ver</div>

          {/* Saldo card */}

    };

    /* ===================== MODAL CONFIRM ===================== */
    const ModalConfirm = ({ msg, onConfirm, onCancel }) => (
      <div style={{ position:'fixed', inset:0, background:'rgba(0,0,0,0.7)', zIndex:200, display:'flex', alignItems:'center', justifyContent:'center', padding:24 }}>

    /* ===================== MODAL EDITAR ===================== */
    const ModalEditar = ({ tx, onSave, onCancel }) => {

      const cats = { gasto:['Alimentação','Transporte','Saúde','Educação','Casa','Beleza','Lazer','Dívidas','Roupas','Outros'], receita:['Salário','Freelance','Vendas','Presente','Outros'] };

    /* ===================== GASTOS SCREEN ===================== */
    const GastosScreen = ({ transacoes, onAdd, onDelete, onEdit }) => {
      const [showForm, setShowForm] = useState(false);
      const [tipo, setTipo] = useState('gasto');
      const [valor, setValor] = useState('');

      const [descricao, setDescricao] = useState('');
      const [data, setData] = useState(hoje());
      const [loading, setLoading] = useState(false);

      const [confirmId, setConfirmId] = useState(null);
      const [editTx, setEditTx] = useState(null);

      const cats = { gasto:['Alimentação','Transporte','Saúde','Educação','Casa','Beleza','Lazer','Dívidas','Roupas','Outros'], receita:['Salário','Freelance','Vendas','Presente','Outros'] };

      const handleAdd = async () => {
        if (!valor || !categoria) return;
        setLoading(true);
        await onAdd({ tipo, valor: parseFloat(valor.replace(',','.')), categoria, descricao, data });
        setValor(''); setCategoria(''); setDescricao(''); setData(hoje());
        setShowForm(false);
        setLoading(false);

      const confirmarDelete = (id) => setConfirmId(id);
      const executarDelete = async () => { await onDelete(confirmId); setConfirmId(null); };

      const txFiltradas = filtro === 'todos' ? transacoes : transacoes.filter(t => t.tipo === filtro);
      const inputS = { width:'100%', background:'rgba(0,0,0,0.3)', border:'1px solid rgba(212,168,71,0.18)', borderRadius:12, padding:'12px 14px', color:'#e8d4c8', fontSize:15, outline:'none', fontFamily:'Nunito', marginBottom:12 };

      return (

          <div style={{ display:'flex', justifyContent:'space-between', alignItems:'center', marginBottom:20 }}>
            <div style={{ fontFamily:"'Playfair Display', serif", fontSize:22, color:'#e8d4c8' }}>Meus Gastos</div>
            <button onClick={() => setShowForm(!showForm)} style={{ background: showForm ? 'rgba(212,71,71,0.15)' : 'rgba(212,168,71,0.12)', border:`1px solid ${showForm ? 'rgba(212,71,71,0.3)' : 'rgba(212,168,71,0.25)'}`, borderRadius:10, padding:'8px 14px', color: showForm ? '#d44747' : '#d4a847', fontSize:13, fontWeight:600, cursor:'pointer', fontFamily:'Nunito' }}>
              {showForm ? '✕ Fechar' : '+ Novo'}
            </button>
          </div>

          {showForm && (
            <div style={{ background:'#1a1008', borderRadius:18, border:'1px solid rgba(212,168,71,0.2)', padding:18, marginBottom:16, animation:'slideUp 0.3s ease' }}>
              <div style={{ display:'flex', gap:8, marginBottom:16 }}>
                {[['gasto','↓ Gasto','#d44747'],['receita','↑ Receita','#5cba7d']].map(([t,l,cor]) => (
                  <button key={t} onClick={() => { setTipo(t); setCategoria(''); }} style={{ flex:1, padding:'11px', borderRadius:12, border:`1.5px solid ${tipo===t ? cor : 'rgba(212,168,71,0.12)'}`, background: tipo===t ? cor+'25' : 'transparent', color: tipo===t ? cor : '#b09080', fontSize:14, fontWeight:700, cursor:'pointer', fontFamily:'Nunito' }}>
                    {l}
                  </button>
                ))}
              </div>
              <div style={{ fontSize:12, color:'#b09080', marginBottom:5 }}>Valor (R$)</div>
              <input style={{ ...inputS, fontSize:22, fontWeight:700, marginBottom:14 }} type="number" inputMode="decimal" placeholder="0,00" value={valor} onChange={e => setValor(e.target.value)} />
              <div style={{ fontSize:12, color:'#b09080', marginBottom:8 }}>Categoria</div>
              <div style={{ display:'flex', flexWrap:'wrap', gap:6, marginBottom:14 }}>
                {cats[tipo].map(c => (
                  <button key={c} onClick={() => setCategoria(c)} style={{ padding:'6px 12px', borderRadius:20, border:`1px solid ${categoria===c ? '#d4a847' : 'rgba(212,168,71,0.12)'}`, background: categoria===c ? 'rgba(212,168,71,0.15)' : 'transparent', color: categoria===c ? '#d4a847' : '#b09080', fontSize:12, fontWeight:500, cursor:'pointer', fontFamily:'Nunito', transition:'all 0.15s' }}>
                    {c}

              </div>
              <div style={{ fontSize:12, color:'#b09080', marginBottom:5 }}>Descrição (opcional)</div>

              <div style={{ fontSize:12, color:'#b09080', marginBottom:5 }}>Data</div>
              <input style={{ ...inputS, marginBottom:18 }} type="date" value={data} onChange={e => setData(e.target.value)} />

                {loading ? 'Salvando...' : 'Salvar lançamento'}

          <div style={{ display:'flex', gap:8, marginBottom:16 }}>

                    </div>
                    <button onClick={() => setEditTx(t)} style={{ background:'rgba(212,168,71,0.08)', border:'1px solid rgba(212,168,71,0.15)', borderRadius:8, cursor:'pointer', padding:'5px 8px', color:'#d4a847' }}>

    /* ===================== METAS SCREEN ===================== */
    const MetasScreen = ({ metas, onAdd, onUpdate, onDelete, isPremium, onUpgrade }) => {
      const [showForm, setShowForm] = useState(false);
      const [titulo, setTitulo] = useState('');
      const [valorTotal, setValorTotal] = useState('');
      const [prazo, setPrazo] = useState('');
      const [loading, setLoading] = useState(false);
      const [confirmId, setConfirmId] = useState(null);
      const [editValorId, setEditValorId] = useState(null);
      const [editValorInput, setEditValorInput] = useState('');

      if (!isPremium) return (
        <div style={{ padding:'20px 16px 100px' }}>
          <div style={{ fontFamily:"'Playfair Display', serif", fontSize:22, color:'#e8d4c8', marginBottom:20 }}>Meus Sonhos</div>
          <PremiumWall onUpgrade={onUpgrade} />
        </div>
      );

      // Calcula meses restantes e quanto guardar por mês
      const calcSimulacao = (valorTotal, valorAtual, prazoStr) => {
        if (!prazoStr || !valorTotal) return null;
        const prazoDate = new Date(prazoStr + 'T12:00:00');
        const agora = new Date();
        const diffMs = prazoDate - agora;
        if (diffMs <= 0) return null;
        const dias = Math.max(1, Math.ceil(diffMs / (1000 * 60 * 60 * 24)));
        const semanas = Math.max(1, Math.ceil(dias / 7));
        const meses = Math.max(1, Math.ceil(dias / 30));
        const anos = Math.max(1, Math.ceil(dias / 365));
        const falta = Math.max(0, valorTotal - (valorAtual || 0));
        return {
          dias, semanas, meses, anos, falta,
          porDia: falta / dias,
          porSemana: falta / semanas,
          porMes: falta / meses,
          porAno: falta / anos,
        };
      };

      const handleAdd = async () => {
        if (!titulo || !valorTotal) return;
        setLoading(true);
        await onAdd({ titulo, valor_total: parseFloat(valorTotal), valor_atual: 0, prazo: prazo || null });
        setTitulo(''); setValorTotal(''); setPrazo('');
        setShowForm(false);
        setLoading(false);
      };

      const handleAtualizarValor = async (m) => {
        const v = parseFloat(editValorInput.replace(',','.'));
        if (!isNaN(v) && v >= 0) await onUpdate(m.id, v);
        setEditValorId(null); setEditValorInput('');
      };

      const inputS = { width:'100%', background:'rgba(0,0,0,0.3)', border:'1px solid rgba(212,168,71,0.18)', borderRadius:12, padding:'12px 14px', color:'#e8d4c8', fontSize:14, outline:'none', fontFamily:'Nunito', marginBottom:12 };

      return (
        <div style={{ padding:'20px 16px 100px', animation:'fadeIn 0.3s ease' }}>

          <div style={{ display:'flex', justifyContent:'space-between', alignItems:'center', marginBottom:20 }}>
            <div style={{ fontFamily:"'Playfair Display', serif", fontSize:22, color:'#e8d4c8' }}>Meus Sonhos</div>
            <button onClick={() => setShowForm(!showForm)} style={{ background:'rgba(212,168,71,0.12)', border:'1px solid rgba(212,168,71,0.25)', borderRadius:10, padding:'8px 14px', color:'#d4a847', fontSize:13, fontWeight:600, cursor:'pointer', fontFamily:'Nunito' }}>
              {showForm ? '✕ Fechar' : '+ Meta'}

          {showForm && (
            <div style={{ background:'#1a1008', borderRadius:18, border:'1px solid rgba(212,168,71,0.2)', padding:18, marginBottom:16, animation:'slideUp 0.3s ease' }}>

              <input style={inputS} placeholder="Ex: Geladeira nova, Viagem, Reserva" value={titulo} onChange={e => setTitulo(e.target.value)} />
              <div style={{ fontSize:12, color:'#b09080', marginBottom:5 }}>Quanto custa? (R$)</div>
              <input style={inputS} type="number" inputMode="decimal" placeholder="0,00" value={valorTotal} onChange={e => setValorTotal(e.target.value)} />

              {/* Simulação em tempo real */}
              {valorTotal && prazo && (() => {
                const sim = calcSimulacao(parseFloat(valorTotal), 0, prazo);

                return (
                  <div style={{ background:'rgba(212,168,71,0.06)', border:'1px solid rgba(212,168,71,0.18)', borderRadius:12, padding:'12px 14px', marginBottom:14 }}>

                    <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:'8px',marginTop:'10px'}}>

                        {label:'Por semana', val: sim.porSemana},
                        {label:'Por mês', val: sim.porMes},
                        {label:'Por ano', val: sim.porAno},

                    </div>

              <button onClick={handleAdd} disabled={loading||!titulo||!valorTotal} style={{ width:'100%', background:'linear-gradient(135deg,#d4a847,#c49030)', color:'#0f0a08', border:'none', borderRadius:13, padding:'13px', fontSize:15, fontWeight:700, cursor:'pointer', fontFamily:'Nunito' }}>

          {metas.length === 0 && !showForm && (
            <div style={{ textAlign:'center', padding:40, color:'#b89080' }}>

              <div style={{ fontSize:13, marginTop:4, color:'#d4a847', cursor:'pointer' }} onClick={() => setShowForm(true)}>Qual é o seu próximo sonho?</div>
            </div>
          )}

          {metas.map(m => {
            const pct = m.valor_total > 0 ? Math.min(100, Math.round((m.valor_atual / m.valor_total) * 100)) : 0;
            const concluida = pct >= 100;
            const falta = Math.max(0, m.valor_total - m.valor_atual);
            const sim = calcSimulacao(m.valor_total, m.valor_atual, m.prazo);
            return (
              <div key={m.id} style={{ background:'#1a1008', borderRadius:18, border:`1px solid ${concluida ? 'rgba(92,186,125,0.3)' : 'rgba(212,168,71,0.12)'}`, padding:16, marginBottom:12, animation:'fadeIn 0.2s ease' }}>
                <div style={{ display:'flex', justifyContent:'space-between', alignItems:'flex-start', marginBottom:8 }}>
                  <div style={{ flex:1 }}>
                    <div style={{ fontSize:16, fontWeight:700, color: concluida ? '#5cba7d' : '#e8d4c8' }}>
                      {concluida ? '✅ ' : '🌟 '}{m.titulo}

                    {m.prazo && <div style={{ fontSize:11, color:'#b09080', marginTop:2 }}>Prazo: {fmtDate(m.prazo)}</div>}
                  </div>
                  <button onClick={() => setConfirmId(m.id)} style={{ background:'rgba(212,71,71,0.08)', border:'1px solid rgba(212,71,71,0.15)', borderRadius:8, cursor:'pointer', padding:'5px 8px', color:'#d44747', marginLeft:8 }}>
                    <Icon n="trash" s={13} c="#d44747" />
                  </button>
                </div>

                {/* Valores em destaque */}
                <div style={{ display:'flex', gap:0, marginBottom:10, background:'rgba(0,0,0,0.25)', borderRadius:12, overflow:'hidden' }}>
                  <div style={{ flex:1, padding:'10px 12px', borderRight:'1px solid rgba(212,168,71,0.08)' }}>
                    <div style={{ fontSize:10, color:'#b89080', marginBottom:2 }}>Guardado</div>
                    <div style={{ fontSize:16, fontWeight:700, color:'#5cba7d' }}>{fmt(m.valor_atual)}</div>
                  </div>
                  <div style={{ flex:1, padding:'10px 12px', borderRight:'1px solid rgba(212,168,71,0.08)' }}>
                    <div style={{ fontSize:10, color:'#b89080', marginBottom:2 }}>Meta</div>
                    <div style={{ fontSize:16, fontWeight:700, color:'#e8d4c8' }}>{fmt(m.valor_total)}</div>
                  </div>
                  <div style={{ flex:1, padding:'10px 12px' }}>
                    <div style={{ fontSize:10, color:'#b89080', marginBottom:2 }}>Falta</div>
                    <div style={{ fontSize:16, fontWeight:700, color: concluida ? '#5cba7d' : '#d4a847' }}>{concluida ? '✓' : fmt(falta)}</div>
                  </div>
                </div>

                {/* Barra de progresso */}
                <div style={{ display:'flex', justifyContent:'space-between', fontSize:11, color:'#b09080', marginBottom:5 }}>
                  <span>{pct}% concluído</span>
                  {concluida && <span style={{color:'#5cba7d'}}>🎉 Sonho alcançado!</span>}
                </div>
                <div style={{ background:'rgba(255,255,255,0.05)', borderRadius:10, height:10, overflow:'hidden', marginBottom:12 }}>
                  <div style={{ height:'100%', background: concluida ? '#5cba7d' : 'linear-gradient(90deg,#8b5e14,#d4a847)', borderRadius:10, width:`${pct}%`, transition:'width 0.5s ease' }} />
                </div>

                {/* Simulação */}
                {sim && !concluida && (
                  <div style={{ background:'rgba(212,168,71,0.05)', borderRadius:10, padding:'10px 12px', marginBottom:12 }}>
                    <div style={{ fontSize:11, color:'#d4a847', fontWeight:700, marginBottom:8, textTransform:'uppercase', letterSpacing:'0.05em' }}>📊 Plano para alcançar em {sim.dias} dias</div>
                    <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:'6px'}}>
                      {[
                        {label:'Por dia', val: sim.porDia},
                        {label:'Por semana', val: sim.porSemana},
                        {label:'Por mês', val: sim.porMes},
                        {label:'Por ano', val: sim.porAno},
                      ].map(({label, val}) => (
                        <div key={label} style={{background:'rgba(0,0,0,0.2)',borderRadius:'8px',padding:'6px 8px',display:'flex',justifyContent:'space-between',alignItems:'center'}}>
                          <span style={{fontSize:'11px',color:'#b09080'}}>{label}</span>
                          <span style={{fontSize:'13px',fontWeight:'700',color:'#d4a847'}}>{fmt(val)}</span>
                        </div>
                      ))}
                    </div>
                  </div>
                )}

                {/* Botões de atualização */}
                {editValorId === m.id ? (
                  <div style={{ display:'flex', gap:8 }}>
                    <input style={{ flex:1, background:'rgba(0,0,0,0.3)', border:'1px solid rgba(212,168,71,0.25)', borderRadius:10, padding:'9px 12px', color:'#e8d4c8', fontSize:14, outline:'none', fontFamily:'Nunito' }}
                      type="number" inputMode="decimal" placeholder="Novo valor total guardado" value={editValorInput} onChange={e => setEditValorInput(e.target.value)} autoFocus
                      onKeyDown={e => e.key === 'Enter' && handleAtualizarValor(m)} />
                    <button onClick={() => handleAtualizarValor(m)} style={{ background:'#d4a847', border:'none', borderRadius:10, padding:'9px 14px', color:'#0f0a08', fontWeight:700, cursor:'pointer', fontSize:13, fontFamily:'Nunito' }}>OK</button>
                    <button onClick={() => { setEditValorId(null); setEditValorInput(''); }} style={{ background:'transparent', border:'1px solid rgba(212,168,71,0.15)', borderRadius:10, padding:'9px', color:'#b09080', cursor:'pointer' }}>✕</button>
                  </div>
                ) : (
                  <div style={{ display:'flex', gap:5 }}>
                    {[['- R$50',-50],['+ R$50',50],['+ R$100',100],['+ R$200',200]].map(([l,v]) => (
                      <button key={l} onClick={() => onUpdate(m.id, Math.max(0, m.valor_atual + v))}

                        {l}
                      </button>
                    ))}
                    <button onClick={() => { setEditValorId(m.id); setEditValorInput(String(m.valor_atual)); }}
                      style={{ padding:'8px 9px', borderRadius:9, border:'1px solid rgba(212,168,71,0.2)', background:'rgba(212,168,71,0.1)', color:'#d4a847', fontSize:11, cursor:'pointer' }}>
                      ✏️
                    </button>
                  </div>
                )}
              </div>
            );
          })}
        </div>
      );
    };

    /* ===================== ENVELOPES SCREEN ===================== */
    const EnvelopesScreen = ({ envelopes, onAdd, onUpdate, onDelete, isPremium, onUpgrade }) => {
      const [showForm, setShowForm] = useState(false);
      const [nome, setNome] = useState('');
      const [limite, setLimite] = useState('');
      const [loading, setLoading] = useState(false);

      if (!isPremium) return (
        <div style={{ padding:'20px 16px 100px' }}>
          <div style={{ fontFamily:"'Playfair Display', serif", fontSize:22, color:'#e8d4c8', marginBottom:20 }}>Envelopes</div>
          <PremiumWall onUpgrade={onUpgrade} />
        </div>
      );

      const handleAdd = async () => {
        if (!nome || !limite) return;
        setLoading(true);
        await onAdd({ nome, valor_limite: parseFloat(limite), valor_gasto: 0, mes_ano: mesAtual() });
        setNome(''); setLimite('');
        setShowForm(false);
        setLoading(false);
      };

      const inputS = { width:'100%', background:'rgba(0,0,0,0.3)', border:'1px solid rgba(212,168,71,0.18)', borderRadius:12, padding:'12px 14px', color:'#e8d4c8', fontSize:14, outline:'none', fontFamily:'Nunito', marginBottom:12 };
      const mesNome = new Date().toLocaleDateString('pt-BR', { month: 'long' });

      return (
        <div style={{ padding:'20px 16px 100px', animation:'fadeIn 0.3s ease' }}>
          <div style={{ display:'flex', justifyContent:'space-between', alignItems:'center', marginBottom:6 }}>
            <div style={{ fontFamily:"'Playfair Display', serif", fontSize:22, color:'#e8d4c8' }}>Envelopes</div>
            <button onClick={() => setShowForm(!showForm)} style={{ background:'rgba(212,168,71,0.12)', border:'1px solid rgba(212,168,71,0.25)', borderRadius:10, padding:'8px 14px', color:'#d4a847', fontSize:13, fontWeight:600, cursor:'pointer', fontFamily:'Nunito' }}>
              + Envelope
            </button>
          </div>
          <div style={{ fontSize:12, color:'#b89080', marginBottom:16 }}>Desafio dos Envelopes · {mesNome}</div>

          <div style={{ background:'linear-gradient(135deg,#1a1008,#0f0a08)', borderRadius:14, border:'1px solid rgba(212,168,71,0.1)', padding:'13px 15px', marginBottom:16, fontSize:13, color:'#c8a090', lineHeight:1.7 }}>
            💡 Separe seu dinheiro em envelopes no início do mês. Quando acabar, acabou! É assim que a mulher sábia mantém o controle.
          </div>

          {showForm && (
            <div style={{ background:'#1a1008', borderRadius:18, border:'1px solid rgba(212,168,71,0.2)', padding:18, marginBottom:16, animation:'slideUp 0.3s ease' }}>
              <div style={{ fontSize:12, color:'#b09080', marginBottom:5 }}>Nome do envelope</div>
              <input style={inputS} placeholder="Ex: Mercado, Farmácia, Lazer..." value={nome} onChange={e => setNome(e.target.value)} />
              <div style={{ fontSize:12, color:'#b09080', marginBottom:5 }}>Quanto coloca neste envelope?</div>
              <input style={{ ...inputS, marginBottom:18 }} type="number" inputMode="decimal" placeholder="R$ 0,00" value={limite} onChange={e => setLimite(e.target.value)} />
              <button onClick={handleAdd} disabled={loading||!nome||!limite} style={{ width:'100%', background:'linear-gradient(135deg,#d4a847,#c49030)', color:'#0f0a08', border:'none', borderRadius:13, padding:'13px', fontSize:15, fontWeight:700, cursor:'pointer', fontFamily:'Nunito' }}>
                Criar envelope
              </button>
            </div>
          )}

          {envelopes.length === 0 && !showForm && (
            <div style={{ textAlign:'center', padding:40, color:'#b89080' }}>
              <Icon n="envelope2" s={36} c="#3d2010" />
              <div style={{ fontSize:14, marginTop:12 }}>Nenhum envelope ainda.</div>
              <div style={{ fontSize:13, marginTop:4, color:'#d4a847', cursor:'pointer' }} onClick={() => setShowForm(true)}>Criar meus envelopes</div>
            </div>
          )}

          {envelopes.map(e => {
            const pct = e.valor_limite > 0 ? Math.min(100, Math.round((e.valor_gasto / e.valor_limite) * 100)) : 0;
            const cor = pct >= 100 ? '#d44747' : pct >= 80 ? '#d4a847' : '#5cba7d';
            const disponivel = Math.max(0, e.valor_limite - e.valor_gasto);
            return (
              <div key={e.id} style={{ background:'#1a1008', borderRadius:18, border:`1px solid ${pct>=100 ? 'rgba(212,71,71,0.3)' : 'rgba(212,168,71,0.1)'}`, padding:16, marginBottom:12, animation:'fadeIn 0.2s ease' }}>
                <div style={{ display:'flex', justifyContent:'space-between', alignItems:'flex-start', marginBottom:10 }}>
                  <div>
                    <div style={{ fontSize:15, fontWeight:700, color:'#e8d4c8' }}>{e.nome}</div>
                    <div style={{ fontSize:12, color:'#b89080', marginTop:2 }}>{fmt(e.valor_gasto)} usado de {fmt(e.valor_limite)}</div>
                  </div>
                  <div style={{ textAlign:'right', display:'flex', flexDirection:'column', alignItems:'flex-end', gap:4 }}>
                    <div style={{ fontSize:13, fontWeight:700, color:cor }}>{pct>=100 ? 'Esgotado!' : `${fmt(disponivel)} restam`}</div>
                    <button onClick={() => onDelete(e.id)} style={{ background:'none', border:'none', cursor:'pointer' }}>

                </div>
                <div style={{ display:'flex', gap:6 }}>
                  {[['- R$10',-10],['+ R$10',10],['+ R$50',50]].map(([l,v]) => (
                    <button key={l} onClick={() => onUpdate(e.id, Math.max(0, e.valor_gasto + v))}
                      style={{ flex:1, padding:'9px', borderRadius:9, border:`1px solid ${v<0 ? 'rgba(212,168,71,0.1)' : 'rgba(212,168,71,0.25)'}`, background: v<0 ? 'transparent' : 'rgba(212,168,71,0.08)', color: v<0 ? '#b89080' : '#d4a847', fontSize:12, fontWeight:600, cursor:'pointer', fontFamily:'Nunito' }}>

                  </button>
                </div>
              </div>
            );
          })}
        </div>
      );
    };

    /* ===================== PERFIL SCREEN ===================== */

    const ConselheiroScreen = ({ isPremium, onUpgrade, profile }) => {
      const [msgs, setMsgs] = React.useState([
        { role: 'assistant', text: 'Olá, ' + (profile?.nome?.split(' ')[0] || 'linda') + '! 🌸 Sou sua conselheira financeira. Pode me perguntar qualquer coisa sobre finanças, economia doméstica, dívidas, investimentos ou organização financeira. Como posso te ajudar hoje?' }
      ]);
      const [input, setInput] = React.useState('');
      const [loading, setLoading] = React.useState(false);
      const bottomRef = React.useRef(null);

      React.useEffect(() => { bottomRef.current?.scrollIntoView({ behavior: 'smooth' }); }, [msgs]);

      const enviar = async () => {
        if (!input.trim() || loading) return;
        if (!isPremium) { onUpgrade(); return; }
        const pergunta = input.trim();
        setInput('');
        setMsgs(m => [...m, { role: 'user', text: pergunta }]);
        setLoading(true);
        try {
          const historico = msgs.slice(-8).map(m => ({ role: m.role === 'assistant' ? 'assistant' : 'user', content: m.text }));
          historico.push({ role: 'user', content: pergunta });
          const systemPrompt = 'Você é Sofia, uma conselheira financeira especializada em ajudar mulheres brasileiras. Seja acolhedora, empática, prática e objetiva. Use linguagem simples. Nunca dê conselhos jurídicos ou médicos. Responda sempre em português brasileiro. Máximo 3 parágrafos curtos.';
          const historicoChat = msgs.slice(-8).map(m => ({
            role: m.role === 'assistant' ? 'assistant' : 'user',
            content: m.text
          }));
          historicoChat.push({ role: 'user', content: pergunta });
          const mensagens = [{ role: 'system', content: systemPrompt }, ...historicoChat];
          const res = await fetch('https://text.pollinations.ai/openai', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
              model: 'openai',
              messages: mensagens,
              private: true
            })
          });
          const data = await res.json();
          const resposta = data.choices?.[0]?.message?.content || 'Desculpe, não consegui responder agora. Tente novamente!';
          setMsgs(m => [...m, { role: 'assistant', text: resposta }]);
        } catch(e) {
          setMsgs(m => [...m, { role: 'assistant', text: 'Ops! Ocorreu um erro. Tente novamente em instantes. 🌸' }]);
        }
        setLoading(false);
      };

      if (!isPremium) return (
        <div style={{padding:'24px',textAlign:'center'}}>
          <div style={{fontSize:'48px',marginBottom:'16px'}}>🤖</div>
          <h2 style={{fontFamily:'Playfair Display',color:'#e8c4a0',fontSize:'20px',marginBottom:'12px'}}>Conselheira Sofia</h2>
          <p style={{color:'#c0a090',fontSize:'14px',marginBottom:'24px',lineHeight:'1.6'}}>Sua conselheira financeira pessoal com IA. Tire dúvidas sobre finanças, dívidas, investimentos e muito mais!</p>
          <div style={{background:'#1a1210',border:'1px solid #3a2820',borderRadius:'16px',padding:'20px',marginBottom:'24px'}}>
            <p style={{color:'#c8a090',fontSize:'13px',lineHeight:'1.7'}}>✨ Disponível apenas para assinantes Premium</p>
          </div>
          <button onClick={onUpgrade} style={{background:'linear-gradient(135deg,#d4a847,#c49030)',color:'#0f0a08',border:'none',borderRadius:'14px',padding:'14px 32px',fontSize:'15px',fontWeight:'700',cursor:'pointer'}}>
            Assinar Premium — R$19,90/mês
          </button>
        </div>
      );

      return (
        <div style={{display:'flex',flexDirection:'column',height:'calc(100vh - 120px)'}}>
          <div style={{padding:'16px',borderBottom:'1px solid #2a1810'}}>
            <h2 style={{fontFamily:'Playfair Display',color:'#d4a847',fontSize:'18px'}}>🤖 Conselheira Sofia</h2>
            <p style={{color:'#c0a090',fontSize:'12px'}}>Sua especialista financeira com IA</p>
          </div>
          <div style={{flex:1,overflowY:'auto',padding:'16px',display:'flex',flexDirection:'column',gap:'12px'}}>
            {msgs.map((m, i) => (
              <div key={i} style={{display:'flex',justifyContent:m.role==='user'?'flex-end':'flex-start'}}>
                <div style={{
                  maxWidth:'80%',padding:'12px 16px',borderRadius:m.role==='user'?'18px 18px 4px 18px':'18px 18px 18px 4px',
                  background:m.role==='user'?'linear-gradient(135deg,#c8784a,#a05830)':'#1a1210',
                  border:m.role==='assistant'?'1px solid #3a2820':'none',
                  color:m.role==='user'?'white':'#c8a090',fontSize:'14px',lineHeight:'1.6'
                }}>
                  {m.role==='assistant' && <span style={{fontSize:'16px',marginRight:'6px'}}>🌸</span>}
                  {m.text}
                </div>
              </div>
            ))}
            {loading && (
              <div style={{display:'flex',justifyContent:'flex-start'}}>
                <div style={{background:'#1a1210',border:'1px solid #3a2820',borderRadius:'18px 18px 18px 4px',padding:'12px 16px',color:'#c0a090',fontSize:'14px'}}>
                  🌸 Sofia está pensando...
                </div>
              </div>
            )}
            <div ref={bottomRef} />
          </div>
          <div style={{padding:'12px 16px',borderTop:'1px solid #2a1810',display:'flex',gap:'8px',background:'#0f0a08'}}>
            <input
              value={input}
              onChange={e => setInput(e.target.value)}
              onKeyDown={e => e.key==='Enter' && enviar()}
              placeholder="Pergunte algo sobre finanças..."
              style={{flex:1,background:'#1a1210',border:'1px solid #3a2820',borderRadius:'24px',padding:'12px 16px',color:'#e8c4a0',fontSize:'14px',outline:'none'}}
            />
            <button onClick={enviar} disabled={loading} style={{background:'linear-gradient(135deg,#d4a847,#c49030)',border:'none',borderRadius:'50%',width:'44px',height:'44px',color:'#0f0a08',fontSize:'20px',cursor:'pointer',display:'flex',alignItems:'center',justifyContent:'center'}}>
              ➤
            </button>
          </div>
        </div>
      );
    };

    const PerfilScreen = ({ profile, isPremium, onLogout, onUpgrade, onActivatePremium }) => {
      const [showCodigo, setShowCodigo] = useState(false);
      const [codigo, setCodigo] = useState('');
      const [ativando, setAtivando] = useState(false);
      const [msg, setMsg] = useState('');

      const handleAtivacao = async () => {
        if (!codigo.trim()) return;
        setAtivando(true); setMsg('');
        const ok = await onActivatePremium(codigo.trim().toUpperCase());
        setMsg(ok ? '✅ Premium ativado! Bem-vinda ao clube!' : '❌ Código inválido. Tente novamente ou entre em contato.');
        setAtivando(false);
        if (ok) { setCodigo(''); setShowCodigo(false); }
      };

      return (
        <div style={{ padding:'20px 16px 100px', animation:'fadeIn 0.3s ease' }}>
          {/* Avatar */}
          <div style={{ textAlign:'center', marginBottom:28 }}>
            <div style={{ width:80, height:80, borderRadius:'50%', background:'linear-gradient(135deg,#d4a847,#8b5e14)', display:'flex', alignItems:'center', justifyContent:'center', fontSize:32, fontWeight:700, color:'#0f0a08', margin:'0 auto 14px', boxShadow:'0 0 30px rgba(212,168,71,0.2)' }}>
              {(profile?.nome || 'M')[0].toUpperCase()}
            </div>
            <div style={{ fontFamily:"'Playfair Display', serif", fontSize:20, color:'#e8d4c8' }}>{profile?.nome || 'Usuária'}</div>
            <div style={{ fontSize:13, color:'#b89080', marginTop:3 }}>{profile?.email}</div>
            {isPremium && (
              <div style={{ display:'inline-flex', alignItems:'center', gap:5, background:'rgba(212,168,71,0.12)', border:'1px solid rgba(212,168,71,0.3)', borderRadius:20, padding:'5px 14px', marginTop:10 }}>
                <Icon n="star" s={13} c="#d4a847" filled />
                <span style={{ fontSize:12, color:'#d4a847', fontWeight:700 }}>Premium ativo</span>
              </div>
            )}
          </div>

          {/* Upgrade block */}
          {!isPremium && (
            <div style={{ background:'linear-gradient(135deg,#2d1a05,#1a0f05)', borderRadius:20, border:'1px solid rgba(212,168,71,0.25)', padding:'20px', marginBottom:20 }}>
              <div style={{ fontFamily:"'Playfair Display', serif", fontSize:18, color:'#d4a847', marginBottom:8 }}>Seja Premium</div>
              <div style={{ fontSize:13, color:'#b09080', lineHeight:1.7, marginBottom:18 }}>
                Metas, Desafio dos Envelopes, Relatórios e muito mais por apenas <strong style={{ color:'#d4a847' }}>{PRECO}</strong>. Cancele quando quiser.
              </div>
              <button onClick={onUpgrade} style={{ width:'100%', background:'linear-gradient(135deg,#d4a847,#c49030)', color:'#0f0a08', border:'none', borderRadius:14, padding:'13px', fontSize:15, fontWeight:700, cursor:'pointer', fontFamily:'Nunito', marginBottom:10, display:'flex', alignItems:'center', justifyContent:'center', gap:8 }}>
                <Icon n="star" s={16} c="#0f0a08" filled />
                Assinar Premium
              </button>
              <button onClick={() => setShowCodigo(!showCodigo)} style={{ width:'100%', background:'transparent', border:'1px solid rgba(212,168,71,0.15)', borderRadius:12, padding:'10px', fontSize:13, color:'#b09080', cursor:'pointer', fontFamily:'Nunito' }}>
                Já paguei · Ativar com código
              </button>
              {showCodigo && (
                <div style={{ marginTop:14, animation:'slideUp 0.25s ease' }}>
                  <input style={{ width:'100%', background:'rgba(0,0,0,0.3)', border:'1px solid rgba(212,168,71,0.2)', borderRadius:12, padding:'12px 14px', color:'#e8d4c8', fontSize:15, outline:'none', fontFamily:'Nunito', marginBottom:10, letterSpacing:'2px', textAlign:'center', textTransform:'uppercase' }}
                    placeholder="Código de ativação" value={codigo} onChange={e => setCodigo(e.target.value)} />
                  <button onClick={handleAtivacao} disabled={ativando} style={{ width:'100%', background:'rgba(212,168,71,0.15)', border:'1px solid rgba(212,168,71,0.3)', borderRadius:12, padding:'11px', color:'#d4a847', fontSize:14, fontWeight:600, cursor:'pointer', fontFamily:'Nunito' }}>
                    {ativando ? 'Verificando...' : 'Ativar'}
                  </button>
                  {msg && <div style={{ fontSize:13, marginTop:8, color: msg.includes('✅') ? '#5cba7d' : '#d44747', textAlign:'center' }}>{msg}</div>}
                </div>
              )}
            </div>
          )}

          {/* Redes Sociais */}
          <div style={{ marginBottom:10 }}>
            <div style={{ fontSize:11, color:'#b89080', textTransform:'uppercase', letterSpacing:'0.07em', fontWeight:700, marginBottom:10 }}>Nos siga nas redes</div>
            {[
              { emoji:'▶️', label:'YouTube', desc:'@LicaoDeMulher', url:'https://www.youtube.com/channel/UCP5RlDgEe-tjAEx1MyhBRHA' },
              { emoji:'📷', label:'Instagram', desc:'@licaodemulher', url:'https://www.instagram.com/licaodemulher/' },
              { emoji:'🎵', label:'TikTok', desc:'@licaodemulher.oficial', url:'https://www.tiktok.com/@licaodemulher.oficial' },
              { emoji:'📝', label:'Blog', desc:'licaodemulher.blogspot.com', url:'https://licaodemulher.blogspot.com/' },
              { emoji:'✉️', label:'Suporte', desc:'licaodemulherchannel@gmail.com', url:'mailto:licaodemulherchannel@gmail.com' },
            ].map((item,i) => (
              <a key={i} href={item.url} target="_blank" rel="noopener noreferrer" style={{ display:'flex', alignItems:'center', gap:14, background:'#1a1008', borderRadius:14, border:'1px solid rgba(212,168,71,0.08)', padding:'13px 16px', marginBottom:8, textDecoration:'none', cursor:'pointer' }}>
                <div style={{ width:36, height:36, borderRadius:10, background:'rgba(212,168,71,0.1)', display:'flex', alignItems:'center', justifyContent:'center', fontSize:18, flexShrink:0 }}>
                  {item.emoji}
                </div>
                <div style={{ flex:1 }}>
                  <div style={{ fontSize:13, fontWeight:600, color:'#c8a090' }}>{item.label}</div>
                  <div style={{ fontSize:11, color:'#b89080' }}>{item.desc}</div>
                </div>
                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#b89080" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M5 12h14M12 5l7 7-7 7"/></svg>
              </a>
            ))}
          </div>

          <div style={{ margin:'20px 0', textAlign:'center', fontSize:12, color:'#b89080', fontStyle:'italic', lineHeight:1.7 }}>
            "A mulher que cuida do dinheiro cuida<br />da própria liberdade."
          </div>

          <button onClick={onLogout} style={{ width:'100%', background:'transparent', border:'1px solid rgba(212,71,71,0.2)', borderRadius:14, padding:'13px', fontSize:14, color:'rgba(212,71,71,0.7)', cursor:'pointer', fontFamily:'Nunito', fontWeight:600 }}>
            Sair da conta
          </button>
          <div style={{ textAlign:'center', fontSize:11, color:'#3d2010', marginTop:16 }}>
            Versão 1.0 · Finanças Lição de Mulher
          </div>
        </div>
      );
    };

    /* ===================== MAIN APP ===================== */
    const App = () => {
      const [user, setUser]           = useState(null);
      const [profile, setProfile]     = useState(null);
      const [tab, setTab]             = useState('home');
      const [transacoes, setTransacoes] = useState([]);
      const [metas, setMetas]         = useState([]);
      const [envelopes, setEnvelopes] = useState([]);
      const [loading, setLoading]     = useState(true);
      const [deferredPrompt, setDeferredPrompt] = useState(null);
      const [showWelcome, setShowWelcome] = useState(false);
      const [showInstall, setShowInstall] = useState(false);

      const isPremium = profile?.is_premium || false;

      const [recoveryMode, setRecoveryMode] = useState(false);

      useEffect(() => {
        const handler = (e) => { e.preventDefault(); setDeferredPrompt(e); setShowInstall(true); };
        window.addEventListener('beforeinstallprompt', handler);
        return () => window.removeEventListener('beforeinstallprompt', handler);
      }, []);

      const handleInstall = async () => {
        if (!deferredPrompt) return;
        deferredPrompt.prompt();
        const { outcome } = await deferredPrompt.userChoice;
        if (outcome === 'accepted') setShowInstall(false);
        setDeferredPrompt(null);
      };
      const [novaSenha, setNovaSenha] = useState('');
      const [novaSenhaMsg, setNovaSenhaMsg] = useState('');
      const [novaSenhaErro, setNovaSenhaErro] = useState('');
      const [novaSenhaLoading, setNovaSenhaLoading] = useState(false);

      const handleAtualizarSenha = async () => {
        setNovaSenhaErro(''); setNovaSenhaMsg('');
        if (!novaSenha || novaSenha.length < 6) { setNovaSenhaErro('A senha deve ter pelo menos 6 caracteres.'); return; }
        setNovaSenhaLoading(true);
        try {
          const { error } = await sb.auth.updateUser({ password: novaSenha });
          if (error) throw error;
          setNovaSenhaMsg('Senha atualizada com sucesso! Redirecionando...');
          setTimeout(() => { setRecoveryMode(false); sb.auth.signOut(); }, 2000);
        } catch(e) {
          setNovaSenhaErro('Erro ao atualizar senha. Tente novamente.');
        }
        setNovaSenhaLoading(false);
      };

      useEffect(() => {
        sb.auth.getSession().then(({ data }) => {
          if (data.session?.user) { setUser(data.session.user); loadAll(data.session.user.id); }
          else setLoading(false);
        });
        const { data: listener } = sb.auth.onAuthStateChange((ev, session) => {
          if (ev === 'PASSWORD_RECOVERY') {
            setRecoveryMode(true);
            setLoading(false);
            return;
          }
          if (session?.user) { setUser(session.user); loadAll(session.user.id); }
          else { setUser(null); setProfile(null); setLoading(false); }
        });
        return () => listener.subscription.unsubscribe();
      }, []);

      const loadAll = async (uid) => {
        try {
          const [p, tx, mt, env] = await Promise.all([
            sb.from('profiles').select('*').eq('id', uid).maybeSingle(),
            sb.from('transacoes').select('*').eq('user_id', uid).order('data', { ascending: false }).order('created_at', { ascending: false }),
            sb.from('metas').select('*').eq('user_id', uid).order('created_at', { ascending: false }),
            sb.from('envelopes').select('*').eq('user_id', uid).eq('mes_ano', mesAtual()).order('created_at', { ascending: false }),
          ]);
          // Se perfil não existe ainda, cria agora
          if (!p.data) {
            const { data: sess } = await sb.auth.getSession();
            const u = sess?.session?.user;
            const nome = u?.user_metadata?.nome || u?.email?.split('@')[0] || 'Usuária';
            const { data: newP } = await sb.from('profiles').insert({ id: uid, nome, email: u?.email || '' }).select().maybeSingle();
            if (newP) { setProfile(newP); setShowWelcome(true); }
          } else {
            setProfile(p.data);
          }
          setTransacoes(tx.data || []);
          setMetas(mt.data || []);
          setEnvelopes(env.data || []);
        } catch(e) { console.error('loadAll error', e); }
        setLoading(false);
      };

      const handleLogout = async () => {
        await sb.auth.signOut();
        setUser(null); setProfile(null);
        setTransacoes([]); setMetas([]); setEnvelopes([]);
      };

      const handleUpgrade = () => {
        window.open(STRIPE_LINK, '_blank');
      };

      const handleActivatePremium = async (cod) => {
        const { data } = await sb.from('codigos_premium').select('*').eq('codigo', cod).eq('usado', false).maybeSingle();
        if (data) {
          await sb.from('codigos_premium').update({ usado: true, usado_por: user.id, usado_em: new Date().toISOString() }).eq('id', data.id);
          await sb.from('profiles').update({ is_premium: true, premium_since: new Date().toISOString() }).eq('id', user.id);
          setProfile(p => ({ ...p, is_premium: true }));
          return true;
        }
        return false;
      };

      // CRUD
      const addTransacao = async (tx) => {
        const { data } = await sb.from('transacoes').insert({ ...tx, user_id: user.id }).select().single();
        if (data) setTransacoes(p => [data, ...p]);
      };
      const delTransacao = async (id) => {
        await sb.from('transacoes').delete().eq('id', id);
        setTransacoes(p => p.filter(t => t.id !== id));
      };

      const editTransacao = async (id, dados) => {
        const { data } = await sb.from('transacoes').update(dados).eq('id', id).select().single();
        if (data) setTransacoes(p => p.map(t => t.id === id ? data : t));
      };

      const addMeta = async (m) => {
        const { data } = await sb.from('metas').insert({ ...m, user_id: user.id }).select().single();
        if (data) setMetas(p => [data, ...p]);
      };
      const updMeta = async (id, valor_atual) => {
        await sb.from('metas').update({ valor_atual }).eq('id', id);
        setMetas(p => p.map(m => m.id === id ? { ...m, valor_atual } : m));
      };
      const delMeta = async (id) => {
        await sb.from('metas').delete().eq('id', id);
        setMetas(p => p.filter(m => m.id !== id));
      };

      const addEnvelope = async (e) => {
        const { data } = await sb.from('envelopes').insert({ ...e, user_id: user.id }).select().single();
        if (data) setEnvelopes(p => [data, ...p]);
      };
      const updEnvelope = async (id, valor_gasto) => {
        await sb.from('envelopes').update({ valor_gasto }).eq('id', id);
        setEnvelopes(p => p.map(e => e.id === id ? { ...e, valor_gasto } : e));
      };
      const delEnvelope = async (id) => {
        await sb.from('envelopes').delete().eq('id', id);
        setEnvelopes(p => p.filter(e => e.id !== id));
      };

      if (loading) return <Loading />;

      if (recoveryMode) return (
        <div style={{minHeight:'100vh',display:'flex',alignItems:'center',justifyContent:'center',padding:'24px',background:'#0f0a08'}}>
          <div style={{width:'100%',maxWidth:'400px',background:'#1a1210',borderRadius:'20px',padding:'32px',border:'1px solid #3a2820'}}>
            <div style={{textAlign:'center',marginBottom:'28px'}}>
              <div style={{fontSize:'40px',marginBottom:'12px'}}>🔐</div>
              <h2 style={{fontFamily:'Playfair Display',color:'#e8c4a0',fontSize:'22px',marginBottom:'8px'}}>Nova Senha</h2>
              <p style={{color:'#c0a090',fontSize:'14px'}}>Digite sua nova senha abaixo</p>
            </div>
            <div style={{position:'relative',marginBottom:'16px'}}>
              <input
                type={showSenha ? 'text' : 'password'}
                placeholder="Nova senha (mínimo 6 caracteres)"
                value={novaSenha}
                onChange={e => setNovaSenha(e.target.value)}
                style={{width:'100%',padding:'14px 44px 14px 16px',background:'#251815',border:'1px solid #3a2820',borderRadius:'12px',color:'#e8c4a0',fontSize:'16px',outline:'none'}}
              />
              <button onClick={() => setShowSenha(s => !s)} type="button" style={{position:'absolute',right:'12px',top:'50%',transform:'translateY(-50%)',background:'none',border:'none',cursor:'pointer',fontSize:'18px',padding:'4px'}}>
                {showSenha ? '🙈' : '👁️'}
              </button>
            </div>
            {novaSenhaErro && <p style={{color:'#e07070',fontSize:'13px',marginBottom:'12px',textAlign:'center'}}>{novaSenhaErro}</p>}
            {novaSenhaMsg && <p style={{color:'#70c070',fontSize:'13px',marginBottom:'12px',textAlign:'center'}}>{novaSenhaMsg}</p>}
            <button
              onClick={handleAtualizarSenha}
              disabled={novaSenhaLoading}
              style={{width:'100%',padding:'14px',background:'linear-gradient(135deg,#c8784a,#a05830)',border:'none',borderRadius:'12px',color:'white',fontSize:'16px',fontWeight:'700',cursor:'pointer'}}
            >
              {novaSenhaLoading ? 'Salvando...' : 'Salvar nova senha'}
            </button>
          </div>
        </div>
      );

      if (!user) return <AuthScreen onLogin={u => { setUser(u); loadAll(u.id); }} />;

      const navItems = [
        { id:'home',      icon:'home',      label:'Início'    },
        { id:'gastos',    icon:'gastos',    label:'Gastos'    },
        { id:'metas',     icon:'target',    label:'Sonhos'    },
        { id:'envelopes', icon:'envelope2', label:'Envelopes' },
        { id:'conselheiro', icon:'star', label:'Sofia IA'  },
        { id:'perfil',    icon:'user',      label:'Perfil'    },
      ];

      return (
        <div style={{ background:'#0f0a08', minHeight:'100vh' }}>
          {/* Top bar */}
          <div style={{ position:'sticky', top:0, zIndex:50, background:'rgba(15,10,8,0.95)', backdropFilter:'blur(10px)', borderBottom:'1px solid rgba(212,168,71,0.08)', padding:'10px 16px', display:'flex', justifyContent:'space-between', alignItems:'center' }}>
            <div style={{ fontFamily:"'Playfair Display', serif", fontSize:17, color:'#d4a847' }}>Lição de Mulher · Finanças</div>
            <div style={{ fontSize:11, color: isPremium ? '#d4a847' : '#b89080', background: isPremium ? 'rgba(212,168,71,0.1)' : 'rgba(90,53,37,0.15)', border:`1px solid ${isPremium ? 'rgba(212,168,71,0.2)' : 'rgba(90,53,37,0.2)'}`, borderRadius:20, padding:'3px 10px', fontWeight:700 }}>
              {isPremium ? '⭐ Premium' : 'Gratuito'}
            </div>
          </div>

          {/* Screens */}
          {tab === 'home'      && <Dashboard  profile={profile} transacoes={transacoes} onAdd={() => setTab('gastos')} />}
          {tab === 'gastos'    && <GastosScreen transacoes={transacoes} onAdd={addTransacao} onDelete={delTransacao} onEdit={editTransacao} />}
          {tab === 'metas'     && <MetasScreen metas={metas} onAdd={addMeta} onUpdate={updMeta} onDelete={delMeta} isPremium={isPremium} onUpgrade={handleUpgrade} />}
          {tab === 'envelopes' && <EnvelopesScreen envelopes={envelopes} onAdd={addEnvelope} onUpdate={updEnvelope} onDelete={delEnvelope} isPremium={isPremium} onUpgrade={handleUpgrade} />}
          {tab === 'conselheiro' && <ConselheiroScreen isPremium={isPremium} onUpgrade={handleUpgrade} profile={profile} />}
          {tab === 'perfil'    && <PerfilScreen profile={profile} isPremium={isPremium} onLogout={handleLogout} onUpgrade={handleUpgrade} onActivatePremium={handleActivatePremium} />}

          {/* Install Banner */}
        {showInstall && (
          <div style={{position:'fixed',top:0,left:0,right:0,zIndex:9999,background:'linear-gradient(135deg,#2a1810,#1a1008)',borderBottom:'1px solid #d4a847',padding:'10px 16px',display:'flex',alignItems:'center',justifyContent:'space-between'}}>
            <div style={{display:'flex',alignItems:'center',gap:'10px'}}>
              <div style={{fontSize:'28px'}}>🌸</div>
              <div>
                <div style={{color:'#e8c4a0',fontSize:'13px',fontWeight:'700'}}>Instalar Lição de Mulher</div>
                <div style={{color:'#b09080',fontSize:'11px'}}>Adicionar à tela inicial como app</div>
              </div>
            </div>
            <div style={{display:'flex',gap:'8px'}}>
              <button onClick={() => setShowInstall(false)} style={{background:'transparent',border:'1px solid #3a2820',borderRadius:'8px',color:'#b09080',padding:'6px 10px',fontSize:'12px',cursor:'pointer'}}>Agora não</button>
              <button onClick={handleInstall} style={{background:'linear-gradient(135deg,#d4a847,#c49030)',border:'none',borderRadius:'8px',color:'#0f0a08',padding:'6px 12px',fontSize:'12px',fontWeight:'700',cursor:'pointer'}}>Instalar ✨</button>
            </div>
          </div>
        )}


      {/* ===== WELCOME MODAL ===== */}
      {showWelcome && (
        <div style={{ position:'fixed', inset:0, zIndex:9999, background:'rgba(0,0,0,0.85)', display:'flex', alignItems:'center', justifyContent:'center', padding:'24px' }}>
          <div style={{ background:'linear-gradient(160deg,#1e1008,#0f0a08)', borderRadius:'24px', border:'1px solid rgba(212,168,71,0.3)', padding:'32px 24px', maxWidth:'380px', width:'100%', textAlign:'center', animation:'fadeIn 0.4s ease' }}>
            {/* Flower */}
            <div style={{ fontSize:'52px', marginBottom:'16px' }}>🌸</div>
            <h2 style={{ fontFamily:"'Playfair Display',serif", color:'#d4a847', fontSize:'22px', marginBottom:'8px' }}>Bem-vinda!</h2>
            <p style={{ color:'#c0a090', fontSize:'14px', lineHeight:1.7, marginBottom:'28px' }}>
              Você deu o primeiro passo para cuidar do seu dinheiro com carinho. Veja como começar:
            </p>
            {/* Steps */}
            {[
              { icon:'💰', title:'Registre seus gastos', desc:'Anote tudo que entra e sai — isso já muda tudo!' },
              { icon:'✉️', title:'Crie seus envelopes', desc:'Separe o dinheiro por categoria e nunca fique no negativo.' },
              { icon:'🌟', title:'Defina um sonho', desc:'Toda conquista começa com uma meta. Qual é a sua?' },
            ].map((s, i) => (
              <div key={i} style={{ display:'flex', alignItems:'flex-start', gap:'14px', marginBottom:'16px', textAlign:'left', background:'rgba(255,255,255,0.03)', borderRadius:'14px', padding:'14px' }}>
                <div style={{ fontSize:'24px', flexShrink:0 }}>{s.icon}</div>
                <div>
                  <div style={{ color:'#e8c4a0', fontSize:'14px', fontWeight:'700', marginBottom:'3px' }}>{s.title}</div>
                  <div style={{ color:'#b09080', fontSize:'12px', lineHeight:1.5 }}>{s.desc}</div>
                </div>
              </div>
            ))}
            <button
              onClick={() => setShowWelcome(false)}
              style={{ width:'100%', background:'linear-gradient(135deg,#d4a847,#c49030)', border:'none', borderRadius:'14px', padding:'14px', color:'#0f0a08', fontSize:'16px', fontWeight:'700', cursor:'pointer', fontFamily:'Nunito', marginTop:'8px' }}
            >
              Vamos começar! 🌸
            </button>
          </div>
        </div>
      )}

        {/* Bottom Nav */}
          <div style={{ position:'fixed', bottom:0, left:'50%', transform:'translateX(-50%)', width:'100%', maxWidth:480, background:'#0d0905', borderTop:'1.5px solid rgba(212,168,71,0.22)', display:'flex', padding:'8px 4px max(12px, env(safe-area-inset-bottom))', zIndex:100, boxShadow:'0 -6px 24px rgba(0,0,0,0.7)' }}>
            {navItems.map(t => {
              const ativo = tab === t.id;
              return (
                <button key={t.id} onClick={() => setTab(t.id)} style={{ flex:1, background:'none', border:'none', cursor:'pointer', display:'flex', flexDirection:'column', alignItems:'center', gap:3, padding:'2px 0', position:'relative' }}>
                  {ativo && <div style={{ position:'absolute', top:-9, left:'50%', transform:'translateX(-50%)', width:28, height:3, background:'#d4a847', borderRadius:'0 0 3px 3px' }} />}
                  <div style={{ width:44, height:34, display:'flex', alignItems:'center', justifyContent:'center', borderRadius:12, background: ativo ? 'rgba(212,168,71,0.16)' : 'transparent', transition:'all 0.2s' }}>
                    <Icon n={t.icon} s={24} c={ativo ? '#d4a847' : '#8a6040'} />
                  </div>
                  <span style={{ fontSize:11, color: ativo ? '#d4a847' : '#8a6040', fontWeight: ativo ? 700 : 500, fontFamily:'Nunito', letterSpacing:'-0.2px' }}>
                    {t.label}
                  </span>
                </button>
              );
            })}
          </div>
        </div>
      );
    };

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>

</body>
</html>
