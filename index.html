  const fmtMoney = (v, currency) => {
    const n = Number(v || 0);
    if (currency === 'R$') {
      return 'R$ ' + n.toLocaleString('pt-BR', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
    }
    return currency + ' ' + n.toLocaleString('en-US', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
  };
  const fmtShortMoney = (v, currency) => {
    const n = Number(v || 0);
    if (currency === 'R$') {
      if (n >= 1000) return 'R$ ' + (n/1000).toFixed(1).replace('.',',') + 'k';
      return 'R$ ' + n.toLocaleString('pt-BR', {minimumFractionDigits:0, maximumFractionDigits:0});
    }
    if (n >= 1000) return currency + ' ' + (n/1000).toFixed(1) + 'k';
    return currency + ' ' + n.toLocaleString('en-US', {minimumFractionDigits:0, maximumFractionDigits:0});
  };

  /* ============================================================

  ============================================================ */
  const YouTubeBanner = () => {
    const { lang, t } = useLang();
    const [video, setVideo] = useState(null);
    const [visible, setVisible] = useState(false);
    const LS_KEY = `ldm_yt_seen_${lang}`;

    const channelData = YT_CHANNELS[lang];
    const CHANNEL_ID = channelData?.channelId || null;

    useEffect(() => {
      if (!CHANNEL_ID) return;
      const fetchVideo = async () => {
        try {
          const rssUrl = `https://www.youtube.com/feeds/videos.xml?channel_id=${CHANNEL_ID}`;
          const apiUrl = `https://api.rss2json.com/v1/api.json?rss_url=${encodeURIComponent(rssUrl)}`;
          const res = await fetch(apiUrl);
          const data = await res.json();
          if (data.status === 'ok' && data.items?.length > 0) {
            const latest = data.items[0];
            const link = latest.link || '';
            const videoId = link.split('v=')[1]?.split('&')[0] || latest.guid?.split('v=')[1]?.split('&')[0] || '';
            const seenId = localStorage.getItem(LS_KEY);
            if (videoId && videoId !== seenId) {
              setVideo({ id:videoId, title:latest.title, thumbnail:`https://img.youtube.com/vi/${videoId}/mqdefault.jpg`, link: link || `https://www.youtube.com/watch?v=${videoId}` });
              setVisible(true);
            }
          }
        } catch(e) {}
      };
      fetchVideo();
    }, [lang]);

    const handleClose = e => { e.preventDefault(); e.stopPropagation(); if (video) localStorage.setItem(LS_KEY, video.id); setVisible(false); };

    if (!visible || !video) return null;

    return (
      <div style={{ marginBottom:14, animation:'slideUp 0.35s ease' }}>
        <a href={video.link} target="_blank" rel="noopener noreferrer" style={{ display:'block', textDecoration:'none' }}>

              <span style={{ fontSize:10, fontWeight:700, color:'white', textTransform:'uppercase', letterSpacing:'0.06em' }}>{t.novoVideo}</span>
            </div>
            <button onClick={handleClose} style={{ position:'absolute', top:8, right:8, background:'rgba(0,0,0,0.55)', border:'none', borderRadius:'50%', width:24, height:24, color:'white', cursor:'pointer', display:'flex', alignItems:'center', justifyContent:'center', fontSize:11, zIndex:2 }}>✕</button>
            <div style={{ display:'flex', gap:12, marginTop:22 }}>
              <div style={{ position:'relative', flexShrink:0 }}>
                <img src={video.thumbnail} alt="" style={{ width:96, height:54, borderRadius:8, objectFit:'cover', display:'block' }} onError={e=>e.target.style.display='none'} />
                <div style={{ position:'absolute', inset:0, display:'flex', alignItems:'center', justifyContent:'center' }}>
                  <div style={{ width:26, height:26, background:'rgba(0,0,0,0.68)', borderRadius:'50%', display:'flex', alignItems:'center', justifyContent:'center' }}>
                    <div style={{ width:0, height:0, borderTop:'6px solid transparent', borderBottom:'6px solid transparent', borderLeft:'11px solid white', marginLeft:2 }} />
                  </div>
                </div>
              </div>
              <div style={{ flex:1, minWidth:0 }}>
                <div style={{ fontSize:11, color:'#ff6b6b', marginBottom:3, fontWeight:600 }}>{t.ytCanal}</div>
                <div style={{ fontSize:13, fontWeight:700, color:'#f0e0e0', lineHeight:1.35, overflow:'hidden', display:'-webkit-box', WebkitLineClamp:2, WebkitBoxOrient:'vertical' }}>{video.title}</div>

  /* ============================================================

  ============================================================ */
  const MetasScreen = ({ metas, onAdd, onUpdate, onDelete, isPremium, onUpgrade }) => {
    const { lang, t } = useLang();
    const currency = LANGS[lang].currency;
    const fmt = v => fmtMoney(v, currency);
    const [showForm, setShowForm] = useState(false);
    const [titulo, setTitulo] = useState('');
    const [valorTotal, setValorTotal] = useState('');
    const [prazo, setPrazo] = useState('');
    const [loading, setLoading] = useState(false);
    const [confirmId, setConfirmId] = useState(null);
    const [editValorId, setEditValorId] = useState(null);
    const [editValorInput, setEditValorInput] = useState('');

    if (!isPremium) return (
      <div style={{ padding:'20px 16px 100px' }}>
        <div style={{ fontFamily:"'Playfair Display',serif", fontSize:22, color:'#e8d4c8', marginBottom:20 }}>{t.meusSonhos}</div>
        <PremiumWall onUpgrade={onUpgrade} />
      </div>
    );

    const calcSim = (vt, va, prazoStr) => {
      if (!prazoStr || !vt) return null;
      const diff = new Date(prazoStr+'T12:00:00') - new Date();
      if (diff <= 0) return null;
      const dias = Math.max(1, Math.ceil(diff/(1000*60*60*24)));
      const falta = Math.max(0, vt-(va||0));
      return { dias, falta, porDia:falta/dias, porSemana:falta/Math.max(1,Math.ceil(dias/7)), porMes:falta/Math.max(1,Math.ceil(dias/30)), porAno:falta/Math.max(1,Math.ceil(dias/365)) };
    };

    const handleAdd = async () => {
      if (!titulo || !valorTotal) return;
      setLoading(true);
      await onAdd({ titulo, valor_total:parseFloat(valorTotal), valor_atual:0, prazo:prazo||null });
      setTitulo(''); setValorTotal(''); setPrazo(''); setShowForm(false); setLoading(false);
    };

    const handleAtualizarValor = async (m) => {
      const v = parseFloat(editValorInput.replace(',','.'));
      if (!isNaN(v) && v >= 0) await onUpdate(m.id, v);
      setEditValorId(null); setEditValorInput('');
    };

    const inputS = { width:'100%', background:'rgba(0,0,0,0.3)', border:'1px solid rgba(212,168,71,0.18)', borderRadius:12, padding:'12px 14px', color:'#e8d4c8', fontSize:14, outline:'none', fontFamily:'Nunito', marginBottom:12 };

    return (
      <div style={{ padding:'20px 16px 100px', animation:'fadeIn 0.3s ease' }}>
        {confirmId && <ModalConfirm msg={t.confirmarMeta} onConfirm={async()=>{await onDelete(confirmId);setConfirmId(null);}} onCancel={()=>setConfirmId(null)} />}

        <div style={{ display:'flex', justifyContent:'space-between', alignItems:'center', marginBottom:20 }}>
          <div style={{ fontFamily:"'Playfair Display',serif", fontSize:22, color:'#e8d4c8' }}>{t.meusSonhos}</div>
          <button onClick={()=>setShowForm(!showForm)} style={{ background:'rgba(212,168,71,0.12)', border:'1px solid rgba(212,168,71,0.25)', borderRadius:10, padding:'8px 14px', color:'#d4a847', fontSize:13, fontWeight:600, cursor:'pointer', fontFamily:'Nunito' }}>
            {showForm ? t.fechar : t.addMeta}
          </button>
        </div>

        {showForm && (
          <div style={{ background:'#1a1008', borderRadius:18, border:'1px solid rgba(212,168,71,0.2)', padding:18, marginBottom:16, animation:'slideUp 0.3s ease' }}>
            <div style={{ fontSize:12, color:'#7a5545', marginBottom:5 }}>{t.qualSonho}</div>
            <input style={inputS} placeholder={t.sonhoPh} value={titulo} onChange={e=>setTitulo(e.target.value)} />
            <div style={{ fontSize:12, color:'#7a5545', marginBottom:5 }}>{t.quantoCusta} ({currency})</div>
            <input style={inputS} type="number" inputMode="decimal" placeholder="0,00" value={valorTotal} onChange={e=>setValorTotal(e.target.value)} />
            <div style={{ fontSize:12, color:'#7a5545', marginBottom:5 }}>{t.prazoLabel}</div>
            <input style={inputS} type="date" value={prazo} onChange={e=>setPrazo(e.target.value)} />
            {valorTotal && prazo && (() => {
              const sim = calcSim(parseFloat(valorTotal), 0, prazo);
              if (!sim) return null;
              return (
                <div style={{ background:'rgba(212,168,71,0.06)', border:'1px solid rgba(212,168,71,0.18)', borderRadius:12, padding:'12px 14px', marginBottom:14 }}>
                  <div style={{ fontSize:11, color:'#d4a847', fontWeight:700, marginBottom:6, textTransform:'uppercase', letterSpacing:'0.05em' }}>{t.simulLabel}</div>
                  <div style={{ fontSize:13, color:'#c8a090', lineHeight:1.8 }}>
                    {t.simulPre} <strong style={{color:'#d4a847'}}>{sim.dias} {t.simulDias}</strong>{t.simulPos}
                  </div>
                  <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:'8px',marginTop:'10px'}}>
                    {[[t.porDia,sim.porDia],[t.porSemana,sim.porSemana],[t.porMes,sim.porMes],[t.porAno,sim.porAno]].map(([label,val]) => (
                      <div key={label} style={{background:'rgba(0,0,0,0.2)',borderRadius:'10px',padding:'8px 10px',textAlign:'center'}}>
                        <div style={{fontSize:'11px',color:'#7a5545',marginBottom:'2px'}}>{label}</div>
                        <div style={{fontSize:'15px',fontWeight:'700',color:'#5cba7d'}}>{fmt(val)}</div>
                      </div>
                    ))}
                  </div>
                </div>
              );
            })()}
            <button onClick={handleAdd} disabled={loading||!titulo||!valorTotal} style={{ width:'100%', background:'linear-gradient(135deg,#d4a847,#c49030)', color:'#0f0a08', border:'none', borderRadius:13, padding:'13px', fontSize:15, fontWeight:700, cursor:'pointer', fontFamily:'Nunito' }}>
              {t.criarMeta}
            </button>
          </div>
        )}

        {metas.length === 0 && !showForm && (
          <div style={{ textAlign:'center', padding:40, color:'#5a3525' }}>
            <div style={{ fontSize:32, marginBottom:12 }}>🌟</div>
            <div style={{ fontSize:14 }}>{t.nenhumaMeta}</div>
            <div style={{ fontSize:13, marginTop:4, color:'#d4a847', cursor:'pointer' }} onClick={()=>setShowForm(true)}>{t.proxSonho}</div>
          </div>
        )}

        {metas.map(m => {
          const pct = m.valor_total > 0 ? Math.min(100, Math.round((m.valor_atual/m.valor_total)*100)) : 0;
          const concluida = pct >= 100;
          const falta = Math.max(0, m.valor_total-m.valor_atual);
          const sim = calcSim(m.valor_total, m.valor_atual, m.prazo);
          return (
            <div key={m.id} style={{ background:'#1a1008', borderRadius:18, border:`1px solid ${concluida?'rgba(92,186,125,0.3)':'rgba(212,168,71,0.12)'}`, padding:16, marginBottom:12, animation:'fadeIn 0.2s ease' }}>
              <div style={{ display:'flex', justifyContent:'space-between', alignItems:'flex-start', marginBottom:8 }}>
                <div style={{ flex:1 }}>
                  <div style={{ fontSize:16, fontWeight:700, color:concluida?'#5cba7d':'#e8d4c8' }}>{concluida?'✅ ':'🌟 '}{m.titulo}</div>
                  {m.prazo && <div style={{ fontSize:11, color:'#7a5545', marginTop:2 }}>{t.prazoInfo} {fmtDate(m.prazo, t.locale)}</div>}
                </div>
                <button onClick={()=>setConfirmId(m.id)} style={{ background:'rgba(212,71,71,0.08)', border:'1px solid rgba(212,71,71,0.15)', borderRadius:8, cursor:'pointer', padding:'5px 8px', color:'#d44747', marginLeft:8 }}>
                  <Icon n="trash" s={13} c="#d44747" />

  const ConselheiroScreen = ({ isPremium, onUpgrade, profile }) => {
    const { t } = useLang();
    const nomePrimeiro = profile?.nome?.split(' ')[0] || '😊';
    const [msgs, setMsgs] = useState([{ role:'assistant', text:t.sofiaHello(nomePrimeiro) }]);
    const [input, setInput] = useState('');
    const [loading, setLoading] = useState(false);
    const bottomRef = useRef(null);

    useEffect(() => { bottomRef.current?.scrollIntoView({ behavior:'smooth' }); }, [msgs]);

    // Reset greeting when language changes
    useEffect(() => {
      setMsgs([{ role:'assistant', text:t.sofiaHello(nomePrimeiro) }]);
    }, [t]);

    const enviar = async () => {
      if (!input.trim() || loading) return;
      if (!isPremium) { onUpgrade(); return; }
      const pergunta = input.trim();
      setInput('');
      setMsgs(m => [...m, { role:'user', text:pergunta }]);
      setLoading(true);
      try {
        const historico = msgs.slice(-8).map(m => ({ role:m.role==='assistant'?'assistant':'user', content:m.text }));
        historico.push({ role:'user', content:pergunta });
        const mensagens = [{ role:'system', content:t.sofiaSystem }, ...historico];
        const res = await fetch('https://text.pollinations.ai/openai', {
          method:'POST', headers:{'Content-Type':'application/json'},
          body:JSON.stringify({ model:'openai', messages:mensagens, private:true })
        });
        const data = await res.json();
        const resposta = data.choices?.[0]?.message?.content || t.sofiaErro;
        setMsgs(m => [...m, { role:'assistant', text:resposta }]);
      } catch(e) {
        setMsgs(m => [...m, { role:'assistant', text:t.sofiaErro }]);
      }
      setLoading(false);
    };

    if (!isPremium) return (
      <div style={{padding:'24px',textAlign:'center'}}>
        <div style={{fontSize:'48px',marginBottom:'16px'}}>🤖</div>
        <h2 style={{fontFamily:'Playfair Display',color:'#e8c4a0',fontSize:'20px',marginBottom:'12px'}}>{t.sofiaTitle.replace('🤖 ','')}</h2>
        <p style={{color:'#a08070',fontSize:'14px',marginBottom:'24px',lineHeight:'1.6'}}>{t.sofiaPremDesc}</p>
        <div style={{background:'#1a1210',border:'1px solid #3a2820',borderRadius:'16px',padding:'20px',marginBottom:'24px'}}>
          <p style={{color:'#c8a090',fontSize:'13px',lineHeight:'1.7'}}>{t.sofiaPremOnly}</p>
        </div>
        <button onClick={onUpgrade} style={{background:'linear-gradient(135deg,#d4a847,#c49030)',color:'#0f0a08',border:'none',borderRadius:'14px',padding:'14px 32px',fontSize:'15px',fontWeight:'700',cursor:'pointer'}}>
          {t.assinarBtn(PRECO)}
        </button>
      </div>
    );

    return (
      <div style={{display:'flex',flexDirection:'column',height:'calc(100vh - 120px)'}}>
        <div style={{padding:'16px',borderBottom:'1px solid #2a1810'}}>
          <h2 style={{fontFamily:'Playfair Display',color:'#d4a847',fontSize:'18px'}}>{t.sofiaTitle}</h2>
          <p style={{color:'#a08070',fontSize:'12px'}}>{t.sofiaSub}</p>
        </div>
        <div style={{flex:1,overflowY:'auto',padding:'16px',display:'flex',flexDirection:'column',gap:'12px'}}>
          {msgs.map((m,i) => (
            <div key={i} style={{display:'flex',justifyContent:m.role==='user'?'flex-end':'flex-start'}}>
              <div style={{maxWidth:'80%',padding:'12px 16px',borderRadius:m.role==='user'?'18px 18px 4px 18px':'18px 18px 18px 4px',background:m.role==='user'?'linear-gradient(135deg,#c8784a,#a05830)':'#1a1210',border:m.role==='assistant'?'1px solid #3a2820':'none',color:m.role==='user'?'white':'#c8a090',fontSize:'14px',lineHeight:'1.6'}}>
                {m.role==='assistant' && <span style={{fontSize:'16px',marginRight:'6px'}}>🌸</span>}
                {m.text}
              </div>
            </div>
          ))}
          {loading && (
            <div style={{display:'flex',justifyContent:'flex-start'}}>
              <div style={{background:'#1a1210',border:'1px solid #3a2820',borderRadius:'18px 18px 18px 4px',padding:'12px 16px',color:'#a08070',fontSize:'14px'}}>
                🌸 {t.sofiaPensando}
              </div>
            </div>
          )}
          <div ref={bottomRef} />
        </div>
        <div style={{padding:'12px 16px',borderTop:'1px solid #2a1810',display:'flex',gap:'8px',background:'#0f0a08'}}>
          <input value={input} onChange={e=>setInput(e.target.value)} onKeyDown={e=>e.key==='Enter'&&enviar()} placeholder={t.sofiaInput} style={{flex:1,background:'#1a1210',border:'1px solid #3a2820',borderRadius:'24px',padding:'12px 16px',color:'#e8c4a0',fontSize:'14px',outline:'none'}} />
          <button onClick={enviar} disabled={loading} style={{background:'linear-gradient(135deg,#d4a847,#c49030)',border:'none',borderRadius:'50%',width:'44px',height:'44px',color:'#0f0a08',fontSize:'20px',cursor:'pointer',display:'flex',alignItems:'center',justifyContent:'center'}}>➤</button>
        </div>
      </div>
    );

          <div style={{ fontSize:13, color:'#5a3525', marginTop:3 }}>{profile?.email}</div>
          {isPremium && (
            <div style={{ display:'inline-flex', alignItems:'center', gap:5, background:'rgba(212,168,71,0.12)', border:'1px solid rgba(212,168,71,0.3)', borderRadius:20, padding:'5px 14px', marginTop:10 }}>
              <Icon n="star" s={13} c="#d4a847" filled />
              <span style={{ fontSize:12, color:'#d4a847', fontWeight:700 }}>{t.premiumAtivo}</span>
            </div>
          )}
        </div>

        {/* Language display — read-only after signup */}
        <div style={{ background:'#1a1008', borderRadius:16, border:'1px solid rgba(212,168,71,0.12)', padding:'14px 16px', marginBottom:16 }}>
          <div style={{ display:'flex', justifyContent:'space-between', alignItems:'center' }}>
            <div>
              <div style={{ fontSize:13, fontWeight:700, color:'#e8d4c8' }}>{t.idiomaLabel}</div>
              <div style={{ fontSize:12, color:'#5a3525', marginTop:2 }}>{LANGS[lang].flag} {LANGS[lang].name}</div>
            </div>
            <div style={{ fontSize:11, color:'#5a3525', fontStyle:'italic' }}>🔒</div>
          </div>
        </div>

        {/* Upgrade */}
        {!isPremium && (
          <div style={{ background:'linear-gradient(135deg,#2d1a05,#1a0f05)', borderRadius:20, border:'1px solid rgba(212,168,71,0.25)', padding:'20px', marginBottom:20 }}>
            <div style={{ fontFamily:"'Playfair Display',serif", fontSize:18, color:'#d4a847', marginBottom:8 }}>{t.sejaPremium}</div>
            <div style={{ fontSize:13, color:'#7a5545', lineHeight:1.7, marginBottom:18 }}>
              {t.premiumDesc(PRECO)}
            </div>
            <button onClick={onUpgrade} style={{ width:'100%', background:'linear-gradient(135deg,#d4a847,#c49030)', color:'#0f0a08', border:'none', borderRadius:14, padding:'13px', fontSize:15, fontWeight:700, cursor:'pointer', fontFamily:'Nunito', marginBottom:10, display:'flex', alignItems:'center', justifyContent:'center', gap:8 }}>
              <Icon n="star" s={16} c="#0f0a08" filled /> {t.assinarPremium}
            </button>
            <button onClick={()=>setShowCodigo(!showCodigo)} style={{ width:'100%', background:'transparent', border:'1px solid rgba(212,168,71,0.15)', borderRadius:12, padding:'10px', fontSize:13, color:'#7a5545', cursor:'pointer', fontFamily:'Nunito' }}>
              {t.jaPaguei}
            </button>
            {showCodigo && (
              <div style={{ marginTop:14, animation:'slideUp 0.25s ease' }}>
                <input style={{ width:'100%', background:'rgba(0,0,0,0.3)', border:'1px solid rgba(212,168,71,0.2)', borderRadius:12, padding:'12px 14px', color:'#e8d4c8', fontSize:15, outline:'none', fontFamily:'Nunito', marginBottom:10, letterSpacing:'2px', textAlign:'center', textTransform:'uppercase' }}
                  placeholder={t.codigoPh} value={codigo} onChange={e=>setCodigo(e.target.value)} />
                <button onClick={handleAtivacao} disabled={ativando} style={{ width:'100%', background:'rgba(212,168,71,0.15)', border:'1px solid rgba(212,168,71,0.3)', borderRadius:12, padding:'11px', color:'#d4a847', fontSize:14, fontWeight:600, cursor:'pointer', fontFamily:'Nunito' }}>
                  {ativando ? t.ativando : t.ativar}
                </button>
                {msg && <div style={{ fontSize:13, marginTop:8, color:msg.includes('✅')?'#5cba7d':'#d44747', textAlign:'center' }}>{msg}</div>}
              </div>
            )}
          </div>
        )}

        {/* Social */}
        <div style={{ marginBottom:10 }}>
          <div style={{ fontSize:11, color:'#5a3525', textTransform:'uppercase', letterSpacing:'0.07em', fontWeight:700, marginBottom:10 }}>{t.sigaNas}</div>
          {socialLinks.map((item,i) => (
            <a key={i} href={item.url} target="_blank" rel="noopener noreferrer" style={{ display:'flex', alignItems:'center', gap:14, background:'#1a1008', borderRadius:14, border:`1px solid ${item.border}`, padding:'13px 16px', marginBottom:8, textDecoration:'none' }}>
              <div style={{ width:40, height:40, borderRadius:12, background:item.bg, display:'flex', alignItems:'center', justifyContent:'center', flexShrink:0, boxShadow:`0 4px 12px ${item.border}` }}>
                {item.icon}
              </div>
              <div style={{ flex:1 }}>
                <div style={{ fontSize:14, fontWeight:700, color:'#e8c4a0' }}>{item.label}</div>
                <div style={{ fontSize:11, color:'#7a5545' }}>{item.desc}</div>
              </div>
              <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#5a3525" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M5 12h14M12 5l7 7-7 7"/></svg>
            </a>
          ))}
        </div>

        <div style={{ margin:'20px 0', textAlign:'center', fontSize:12, color:'#5a3525', fontStyle:'italic', lineHeight:1.7 }}>
          {t.citaPerfil}
        </div>

        <button onClick={handleLogout} disabled={loggingOut} style={{ width:'100%', background:'transparent', border:'1px solid rgba(212,71,71,0.2)', borderRadius:14, padding:'13px', fontSize:14, color:'rgba(212,71,71,0.7)', cursor:'pointer', fontFamily:'Nunito', fontWeight:600 }}>
          {loggingOut ? t.saindo : t.sair}
        </button>
        <div style={{ textAlign:'center', fontSize:11, color:'#3d2010', marginTop:16 }}>
          Versão 1.0 · Finanças Lição de Mulher
        </div>
      </div>
    );
  };

  /* ============================================================
     MAIN APP
  ============================================================ */
  const App = () => {
    /* ── Language state — persisted in localStorage ── */
    const [lang, setLangState] = useState(() => {
      const saved = localStorage.getItem('ldm_lang');
      return (saved && LANGS[saved]) ? saved : 'pt';
    });
    const [langChosen, setLangChosen] = useState(() => !!localStorage.getItem('ldm_lang_chosen'));
    const [showLangModal, setShowLangModal] = useState(false);

    const setLang = (key) => {
      if (!LANGS[key]) return;
      setLangState(key);
      localStorage.setItem('ldm_lang', key);
      setLangChosen(true);
      localStorage.setItem('ldm_lang_chosen', '1');
    };

    const t = LANGS[lang];

    /* ── Auth & data ── */
    const [user, setUser]             = useState(null);
    const [profile, setProfile]       = useState(null);
    const [tab, setTab]               = useState('home');
    const [transacoes, setTransacoes] = useState([]);
    const [metas, setMetas]           = useState([]);
    const [envelopes, setEnvelopes]   = useState([]);
    const [loading, setLoading]       = useState(true);
    const [deferredPrompt, setDeferredPrompt] = useState(null);
    const [showInstall, setShowInstall] = useState(false);
    const [recoveryMode, setRecoveryMode] = useState(false);
    const [novaSenha, setNovaSenha]   = useState('');
    const [novaSenhaMsg, setNovaSenhaMsg]   = useState('');
    const [novaSenhaErro, setNovaSenhaErro] = useState('');
    const [novaSenhaLoading, setNovaSenhaLoading] = useState(false);
    const [showSenha, setShowSenha]   = useState(false);

    const isPremium = profile?.is_premium || false;

    useEffect(() => {
      const handler = e => { e.preventDefault(); setDeferredPrompt(e); setShowInstall(true); };
      window.addEventListener('beforeinstallprompt', handler);
      return () => window.removeEventListener('beforeinstallprompt', handler);
    }, []);

    const handleInstall = async () => {
      if (!deferredPrompt) return;
      deferredPrompt.prompt();
      const { outcome } = await deferredPrompt.userChoice;
      if (outcome === 'accepted') setShowInstall(false);
      setDeferredPrompt(null);
    };

    const handleAtualizarSenha = async () => {
      setNovaSenhaErro(''); setNovaSenhaMsg('');
      if (!novaSenha || novaSenha.length < 6) { setNovaSenhaErro(t.senhaMinErro); return; }
      setNovaSenhaLoading(true);
      try {
        const { error } = await sb.auth.updateUser({ password: novaSenha });
        if (error) throw error;
        setNovaSenhaMsg(t.senhaOk);
        setTimeout(() => { setRecoveryMode(false); sb.auth.signOut(); }, 2000);
      } catch(e) { setNovaSenhaErro(t.senhaErro); }
      setNovaSenhaLoading(false);
    };

    useEffect(() => {
      sb.auth.getSession().then(({ data }) => {
        if (data.session?.user) { setUser(data.session.user); loadAll(data.session.user.id); }
        else setLoading(false);
      });
      const { data: listener } = sb.auth.onAuthStateChange((ev, session) => {
        if (ev === 'PASSWORD_RECOVERY') { setRecoveryMode(true); setLoading(false); return; }
        if (session?.user) { setUser(session.user); loadAll(session.user.id); }
        else { setUser(null); setProfile(null); setLoading(false); }
      });
      return () => listener.subscription.unsubscribe();
    }, []);

    const loadAll = async (uid) => {
      try {
        const [p, tx, mt, env] = await Promise.all([
          sb.from('profiles').select('*').eq('id', uid).maybeSingle(),
          sb.from('transacoes').select('*').eq('user_id', uid).order('data', {ascending:false}).order('created_at', {ascending:false}),
          sb.from('metas').select('*').eq('user_id', uid).order('created_at', {ascending:false}),
          sb.from('envelopes').select('*').eq('user_id', uid).eq('mes_ano', mesAtual()).order('created_at', {ascending:false}),
        ]);
        if (!p.data) {
          const { data:sess } = await sb.auth.getSession();
          const u = sess?.session?.user;
          const nome = u?.user_metadata?.nome || u?.email?.split('@')[0] || 'Usuária';
          const userLang = u?.user_metadata?.lang || lang;
          const { data:newP } = await sb.from('profiles').insert({ id:uid, nome, email:u?.email||'', lang:userLang }).select().maybeSingle();
          if (newP) { setProfile(newP); setLang(userLang); }
        } else {
          setProfile(p.data);
          if (p.data.lang && LANGS[p.data.lang]) setLang(p.data.lang);
        }
        setTransacoes(tx.data||[]);
        setMetas(mt.data||[]);
        setEnvelopes(env.data||[]);
      } catch(e) { console.error('loadAll error', e); }
      setLoading(false);
    };

    const handleLogout = async () => {
      await sb.auth.signOut();
      setUser(null); setProfile(null);
      setTransacoes([]); setMetas([]); setEnvelopes([]);
    };

    const handleUpgrade = () => window.open(STRIPE_LINK, '_blank');

    const handleActivatePremium = async (cod) => {
      const { data } = await sb.from('codigos_premium').select('*').eq('codigo', cod).eq('usado', false).maybeSingle();
      if (data) {
        await sb.from('codigos_premium').update({ usado:true, usado_por:user.id, usado_em:new Date().toISOString() }).eq('id', data.id);
        await sb.from('profiles').update({ is_premium:true, premium_since:new Date().toISOString() }).eq('id', user.id);
        setProfile(p => ({ ...p, is_premium:true }));
        return true;
      }
      return false;
    };

    /* CRUD */
    const addTransacao = async (tx) => { const { data } = await sb.from('transacoes').insert({ ...tx, user_id:user.id }).select().single(); if (data) setTransacoes(p => [data,...p]); };
    const delTransacao = async (id) => { await sb.from('transacoes').delete().eq('id', id); setTransacoes(p => p.filter(tx => tx.id !== id)); };
    const editTransacao = async (id, dados) => { const { data } = await sb.from('transacoes').update(dados).eq('id', id).select().single(); if (data) setTransacoes(p => p.map(tx => tx.id===id?data:tx)); };
    const addMeta = async (m) => { const { data } = await sb.from('metas').insert({ ...m, user_id:user.id }).select().single(); if (data) setMetas(p => [data,...p]); };
    const updMeta = async (id, valor_atual) => { await sb.from('metas').update({ valor_atual }).eq('id', id); setMetas(p => p.map(m => m.id===id?{...m,valor_atual}:m)); };
    const delMeta = async (id) => { await sb.from('metas').delete().eq('id', id); setMetas(p => p.filter(m => m.id !== id)); };
    const addEnvelope = async (e) => { const { data } = await sb.from('envelopes').insert({ ...e, user_id:user.id }).select().single(); if (data) setEnvelopes(p => [data,...p]); };
    const updEnvelope = async (id, valor_gasto) => { await sb.from('envelopes').update({ valor_gasto }).eq('id', id); setEnvelopes(p => p.map(e => e.id===id?{...e,valor_gasto}:e)); };
    const delEnvelope = async (id) => { await sb.from('envelopes').delete().eq('id', id); setEnvelopes(p => p.filter(e => e.id !== id)); };

    const navItems = [
      { id:'home',        icon:'home',      label: t.navInicio     },
      { id:'gastos',      icon:'gastos',    label: t.navGastos     },
      { id:'metas',       icon:'target',    label: t.navMetas      },
      { id:'envelopes',   icon:'envelope2', label: t.navEnvelopes  },
      { id:'conselheiro', icon:'star',      label: t.navSofia      },
      { id:'perfil',      icon:'user',      label: t.navPerfil     },
    ];

    const ctxValue = { lang, t, setLang };

    if (loading) return <LangCtx.Provider value={ctxValue}><Loading /></LangCtx.Provider>;

    /* Recovery screen */
    if (recoveryMode) return (
      <LangCtx.Provider value={ctxValue}>
        <div style={{minHeight:'100vh',display:'flex',alignItems:'center',justifyContent:'center',padding:'24px',background:'#0f0a08'}}>
          <div style={{width:'100%',maxWidth:'400px',background:'#1a1210',borderRadius:'20px',padding:'32px',border:'1px solid #3a2820'}}>
            <div style={{textAlign:'center',marginBottom:'28px'}}>
              <div style={{fontSize:'40px',marginBottom:'12px'}}>🔐</div>
              <h2 style={{fontFamily:'Playfair Display',color:'#e8c4a0',fontSize:'22px',marginBottom:'8px'}}>{t.novaSenhaTitle}</h2>
              <p style={{color:'#a08070',fontSize:'14px'}}>{t.novaSenhaSub}</p>
            </div>
            <div style={{position:'relative',marginBottom:'16px'}}>
              <input type={showSenha?'text':'password'} placeholder={t.novaSenhaPh} value={novaSenha} onChange={e=>setNovaSenha(e.target.value)} style={{width:'100%',padding:'14px 44px 14px 16px',background:'#251815',border:'1px solid #3a2820',borderRadius:'12px',color:'#e8c4a0',fontSize:'16px',outline:'none'}} />
              <button onClick={()=>setShowSenha(s=>!s)} type="button" style={{position:'absolute',right:'12px',top:'50%',transform:'translateY(-50%)',background:'none',border:'none',cursor:'pointer',fontSize:'18px',padding:'4px'}}>{showSenha?'🙈':'👁️'}</button>
            </div>
            {novaSenhaErro && <p style={{color:'#e07070',fontSize:'13px',marginBottom:'12px',textAlign:'center'}}>{novaSenhaErro}</p>}
            {novaSenhaMsg  && <p style={{color:'#70c070',fontSize:'13px',marginBottom:'12px',textAlign:'center'}}>{novaSenhaMsg}</p>}
            <button onClick={handleAtualizarSenha} disabled={novaSenhaLoading} style={{width:'100%',padding:'14px',background:'linear-gradient(135deg,#c8784a,#a05830)',border:'none',borderRadius:'12px',color:'white',fontSize:'16px',fontWeight:'700',cursor:'pointer'}}>
              {novaSenhaLoading ? t.salvandoSenha : t.salvarSenha}
            </button>
          </div>
        </div>
      </LangCtx.Provider>
    );

    if (!user) return (
      <LangCtx.Provider value={ctxValue}>
        {showLangModal && <LangPickerModal onClose={()=>setShowLangModal(false)} />}
        <AuthScreen onLogin={u=>{setUser(u);loadAll(u.id);}} onOpenLang={()=>setShowLangModal(true)} langChosen={langChosen} />
      </LangCtx.Provider>
    );

    return (
      <LangCtx.Provider value={ctxValue}>

        <div style={{ background:'#0f0a08', minHeight:'100vh' }}>
          {/* Top bar */}
          <div style={{ position:'sticky', top:0, zIndex:50, background:'rgba(15,10,8,0.95)', backdropFilter:'blur(10px)', borderBottom:'1px solid rgba(212,168,71,0.08)', padding:'10px 16px', display:'flex', justifyContent:'space-between', alignItems:'center' }}>
            <div style={{ fontFamily:"'Playfair Display',serif", fontSize:17, color:'#d4a847' }}>Lição de Mulher · Finanças</div>
            <div style={{ display:'flex', alignItems:'center', gap:8 }}>
              <div style={{display:"flex",alignItems:"center",gap:5,background:"rgba(212,168,71,0.08)",border:"1px solid rgba(212,168,71,0.2)",borderRadius:20,padding:"4px 10px",fontSize:13}}><span>{LANGS[lang].flag}</span></div>
              <div style={{ fontSize:11, color:isPremium?'#d4a847':'#5a3525', background:isPremium?'rgba(212,168,71,0.1)':'rgba(90,53,37,0.15)', border:`1px solid ${isPremium?'rgba(212,168,71,0.2)':'rgba(90,53,37,0.2)'}`, borderRadius:20, padding:'3px 10px', fontWeight:700 }}>
                {isPremium ? t.premium : t.gratuito}
              </div>
            </div>
          </div>

          {/* Screens */}
          {tab==='home'        && <Dashboard profile={profile} transacoes={transacoes} onAdd={()=>setTab('gastos')} />}
          {tab==='gastos'      && <GastosScreen transacoes={transacoes} onAdd={addTransacao} onDelete={delTransacao} onEdit={editTransacao} />}
          {tab==='metas'       && <MetasScreen metas={metas} onAdd={addMeta} onUpdate={updMeta} onDelete={delMeta} isPremium={isPremium} onUpgrade={handleUpgrade} />}
          {tab==='envelopes'   && <EnvelopesScreen envelopes={envelopes} onAdd={addEnvelope} onUpdate={updEnvelope} onDelete={delEnvelope} isPremium={isPremium} onUpgrade={handleUpgrade} />}
          {tab==='conselheiro' && <ConselheiroScreen isPremium={isPremium} onUpgrade={handleUpgrade} profile={profile} />}
          {tab==='perfil'      && <PerfilScreen profile={profile} isPremium={isPremium} onLogout={handleLogout} onUpgrade={handleUpgrade} onActivatePremium={handleActivatePremium} onOpenLang={null} />}

          {/* Install banner */}
          {showInstall && (
            <div style={{position:'fixed',top:0,left:0,right:0,zIndex:9999,background:'linear-gradient(135deg,#2a1810,#1a1008)',borderBottom:'1px solid #d4a847',padding:'10px 16px',display:'flex',alignItems:'center',justifyContent:'space-between'}}>
              <div style={{display:'flex',alignItems:'center',gap:'10px'}}>
                <div style={{fontSize:'28px'}}>🌸</div>
                <div>
                  <div style={{color:'#e8c4a0',fontSize:'13px',fontWeight:'700'}}>{t.instalarTitle}</div>
                  <div style={{color:'#7a5545',fontSize:'11px'}}>{t.instalarSub}</div>
                </div>
              </div>
              <div style={{display:'flex',gap:'8px'}}>
                <button onClick={()=>setShowInstall(false)} style={{background:'transparent',border:'1px solid #3a2820',borderRadius:'8px',color:'#7a5545',padding:'6px 10px',fontSize:'12px',cursor:'pointer'}}>{t.agoraNao}</button>
                <button onClick={handleInstall} style={{background:'linear-gradient(135deg,#d4a847,#c49030)',border:'none',borderRadius:'8px',color:'#0f0a08',padding:'6px 12px',fontSize:'12px',fontWeight:'700',cursor:'pointer'}}>{t.instalarBtn}</button>
              </div>
            </div>
          )}

          {/* Bottom nav */}
          <div style={{ position:'fixed', bottom:0, left:'50%', transform:'translateX(-50%)', width:'100%', maxWidth:480, background:'#0d0905', borderTop:'1.5px solid rgba(212,168,71,0.22)', display:'flex', padding:'8px 4px max(12px, env(safe-area-inset-bottom))', zIndex:100, boxShadow:'0 -6px 24px rgba(0,0,0,0.7)' }}>
            {navItems.map(item => {
              const ativo = tab === item.id;
              return (
                <button key={item.id} onClick={()=>setTab(item.id)} style={{ flex:1, background:'none', border:'none', cursor:'pointer', display:'flex', flexDirection:'column', alignItems:'center', gap:3, padding:'2px 0', position:'relative' }}>
                  {ativo && <div style={{ position:'absolute', top:-9, left:'50%', transform:'translateX(-50%)', width:28, height:3, background:'#d4a847', borderRadius:'0 0 3px 3px' }} />}
                  <div style={{ width:44, height:34, display:'flex', alignItems:'center', justifyContent:'center', borderRadius:12, background:ativo?'rgba(212,168,71,0.16)':'transparent', transition:'all 0.2s' }}>
                    <Icon n={item.icon} s={24} c={ativo?'#d4a847':'#8a6040'} />
                  </div>
                  <span style={{ fontSize:11, color:ativo?'#d4a847':'#8a6040', fontWeight:ativo?700:500, fontFamily:'Nunito', letterSpacing:'-0.2px' }}>{item.label}</span>
                </button>
              );
            })}
          </div>
        </div>
      </LangCtx.Provider>
    );
  };

  ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
